<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dave · Journal</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;900&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#141110;--s1:#1b1712;--s2:#211c16;--s3:#2b241b;--border:#322a20;--border2:#463a2b;--accent:#e8622b;--adim:rgba(232,98,43,0.12);--green:#8ec63f;--gdim:rgba(142,198,63,0.12);--orange:#e8843b;--odim:rgba(232,132,59,0.12);--yellow:#f0a92b;--ydim:rgba(240,169,43,0.12);--red:#ef4d4d;--rdim:rgba(239,77,77,0.12);--purple:#c9954a;--pdim:rgba(201,149,74,0.12);--blue:#3ea6c4;--bdim:rgba(62,166,196,0.12);--teal:#2fb59e;--tdim:rgba(47,181,158,0.12);--text:#efe7da;--muted:#8a8177;--muted2:#4a4237;--disp:'Archivo',sans-serif;--mono:'Space Mono',monospace;--sans:'Inter',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;padding-bottom:90px}
.nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(7,9,13,0.95);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:10px 0 max(10px,env(safe-area-inset-bottom))}
.nav-link{display:flex;flex-direction:column;align-items:center;gap:4px;text-decoration:none;color:var(--muted);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;padding:6px 10px;border-radius:10px;transition:color 0.2s}
.nav-link svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.nav-link.active,.nav-link:hover{color:var(--blue)}
.wrap{max-width:600px;margin:0 auto;padding:20px 16px}
.page-header{padding:20px 0 20px;display:flex;justify-content:space-between;align-items:center;gap:8px}
.page-header h1{font-family:'Archivo',sans-serif;font-weight:900;font-size:38px;letter-spacing:2px}
.page-header .sub{font-size:10px;letter-spacing:4px;color:var(--blue);text-transform:uppercase;margin-bottom:4px}
.date-nav{display:flex;align-items:center;gap:8px;background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:7px 12px}
.date-nav button{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;transition:color 0.2s}
.date-nav button:hover{color:var(--blue)}
.dlabel{font-family:'Space Mono',monospace;font-size:11px;color:var(--text);min-width:60px;text-align:center}

.card{background:var(--s1);border:1px solid var(--border);border-radius:18px;padding:18px;margin-bottom:14px}
.card-title{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--blue);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.card-title::after{content:'';flex:1;height:1px;background:var(--border)}

.intro{font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:8px}

/* Tag groups */
.tag-group{margin-bottom:14px}
.tag-group-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.tag-row{display:flex;flex-wrap:wrap;gap:6px}
.tag{display:inline-flex;align-items:center;gap:6px;background:var(--s2);border:1px solid var(--border);border-radius:99px;padding:7px 12px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;transition:all 0.15s;font-family:'Inter',sans-serif}
.tag:hover{border-color:var(--blue);color:var(--text)}
.tag .tag-emoji{font-size:14px;line-height:1}
.tag.selected{background:var(--bdim);border-color:var(--blue);color:var(--blue)}
.tag.selected.neg{background:var(--rdim);border-color:var(--red);color:var(--red)}
.tag.selected.pos{background:var(--gdim);border-color:var(--green);color:var(--green)}

/* Note field */
.note-row{margin-top:14px}
.note-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.note-input{width:100%;background:var(--s2);border:1px solid var(--border2);border-radius:10px;padding:10px 12px;color:var(--text);font-family:'Inter',sans-serif;font-size:13px;outline:none;resize:none;min-height:60px;transition:border-color 0.2s}
.note-input:focus{border-color:var(--blue)}
.note-input::placeholder{color:var(--muted)}

/* Save bar */
.save-row{display:flex;gap:8px;margin-top:12px}
.save-btn{flex:1;background:var(--blue);color:var(--bg);border:none;border-radius:10px;padding:12px;font-family:'Archivo',sans-serif;font-weight:900;font-size:18px;letter-spacing:2px;cursor:pointer;transition:opacity 0.2s}
.save-btn:hover{opacity:0.85}
.save-btn:disabled{background:var(--muted2);color:var(--muted);cursor:not-allowed}
.clear-btn{background:var(--s2);border:1px solid var(--border2);border-radius:10px;padding:0 18px;color:var(--muted);font-family:'Inter',sans-serif;font-size:12px;font-weight:600;letter-spacing:1px;cursor:pointer;transition:all 0.2s}
.clear-btn:hover{color:var(--red);border-color:var(--red)}

.save-status{font-size:11px;color:var(--muted);text-align:center;min-height:16px;margin-top:8px}
.save-status.success{color:var(--green)}

/* Custom tag input */
.custom-tag-row{display:flex;gap:6px;margin-top:8px}
.custom-tag-input{flex:1;background:var(--s2);border:1px solid var(--border2);border-radius:8px;padding:7px 12px;color:var(--text);font-family:'Inter',sans-serif;font-size:12px;outline:none}
.custom-tag-input:focus{border-color:var(--blue)}
.custom-tag-btn{background:var(--bdim);border:1px solid var(--blue);border-radius:8px;padding:7px 14px;color:var(--blue);font-family:'Archivo',sans-serif;font-weight:900;font-size:13px;letter-spacing:1.5px;cursor:pointer;transition:opacity 0.2s}
.custom-tag-btn:hover{opacity:0.85}

/* Tabs */
.tabs{display:flex;gap:6px;background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:4px;margin-bottom:14px}
.tab{flex:1;background:none;border:none;color:var(--muted);font-family:'Inter',sans-serif;font-size:12px;font-weight:600;letter-spacing:2px;text-transform:uppercase;padding:10px;border-radius:8px;cursor:pointer;transition:all 0.2s}
.tab.active{background:var(--s3);color:var(--blue)}

/* History entries */
.history-list{display:flex;flex-direction:column;gap:8px;max-height:600px;overflow-y:auto}
.history-list::-webkit-scrollbar{width:2px}
.history-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}
.hist-entry{background:var(--s2);border:1px solid var(--border);border-radius:12px;padding:12px 14px}
.hist-entry.today{border-color:var(--blue)}
.hist-entry.empty{opacity:0.5}
.hist-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.hist-date{font-size:12px;font-weight:600;color:var(--text)}
.hist-dow{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.hist-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px}
.hist-tag{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:3px 8px;border-radius:99px;background:var(--s3);color:var(--muted)}
.hist-tag.neg{background:rgba(255,61,113,0.15);color:var(--red)}
.hist-tag.pos{background:rgba(0,255,136,0.15);color:var(--green)}
.hist-tag .te{font-size:11px}
.hist-note{font-size:12px;color:var(--muted);line-height:1.5;font-style:italic;margin-top:6px;padding-left:8px;border-left:2px solid var(--border2)}
.hist-empty-msg{font-size:11px;color:var(--muted2);font-style:italic}

/* Tag frequency chart */
.freq-list{display:flex;flex-direction:column;gap:6px}
.freq-row{display:flex;align-items:center;gap:10px}
.freq-label{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text);min-width:140px}
.freq-bar-track{flex:1;height:8px;background:var(--border);border-radius:99px;overflow:hidden}
.freq-bar-fill{height:100%;border-radius:99px;background:var(--blue);transition:width 0.6s ease}
.freq-bar-fill.neg{background:var(--red)}
.freq-bar-fill.pos{background:var(--green)}
.freq-count{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);min-width:24px;text-align:right}

.empty-state{text-align:center;padding:28px;color:var(--muted);font-size:13px;line-height:2}
</style>
</head>
<body>
<div class="wrap">
  <div class="page-header">
    <div>
      <div class="sub">Wellness OS</div>
      <h1>JOURNAL</h1>
    </div>
    <div class="date-nav">
      <button id="prevDay">&#9666;</button>
      <div class="dlabel" id="dateLabel">Today</div>
      <button id="nextDay">&#9656;</button>
    </div>
  </div>

  <div class="intro">Tag what happened today. Patterns over weeks tell you what helps your training, sleep, and mood — and what doesn't.</div>

  <!-- TAG PICKER -->
  <div class="card">
    <div class="card-title">How was your day?</div>
    <div id="tagGroups"></div>

    <div class="custom-tag-row">
      <input class="custom-tag-input" id="customTagInput" placeholder="Add custom tag..." maxlength="30">
      <button class="custom-tag-btn" id="customTagBtn">+ ADD</button>
    </div>

    <div class="note-row">
      <div class="note-label">Note (optional)</div>
      <textarea class="note-input" id="noteInput" placeholder="A line about how today went..." maxlength="200"></textarea>
    </div>

    <div class="save-row">
      <button class="save-btn" id="saveBtn">SAVE ENTRY</button>
      <button class="clear-btn" id="clearBtn">CLEAR</button>
    </div>
    <div class="save-status" id="saveStatus"></div>
  </div>

  <!-- HISTORY -->
  <div class="tabs">
    <button class="tab active" data-period="7">7 DAYS</button>
    <button class="tab" data-period="30">30 DAYS</button>
  </div>

  <!-- TAG FREQUENCY -->
  <div class="card">
    <div class="card-title">Most Common Tags</div>
    <div class="freq-list" id="freqList">
      <div class="empty-state">Nothing tagged in this period yet.</div>
    </div>
  </div>

  <!-- DAY-BY-DAY -->
  <div class="card">
    <div class="card-title">Daily Log</div>
    <div class="history-list" id="historyList"></div>
  </div>
</div>

<script src="db.js"></script>
<script>
// ════════════════════════════════════════════════════════════
// CANONICAL TAG LIBRARY
// Each tag has: id, label, emoji, group, valence (+1 good / -1 bad / 0 neutral)
// Valence drives both the color in the UI and the Readiness score on the Hub.
// ════════════════════════════════════════════════════════════
var TAGS = [
  // Sleep
  {id:'bad_sleep',    label:'Bad sleep',      emoji:'😴', group:'Sleep',     val:-1},
  {id:'great_sleep',  label:'Great sleep',    emoji:'💤', group:'Sleep',     val:+1},

  // Body
  {id:'sore',         label:'Sore',           emoji:'🥴', group:'Body',      val:-1},
  {id:'sick',         label:'Sick',           emoji:'🤒', group:'Body',      val:-1},
  {id:'tired',        label:'Tired',          emoji:'😪', group:'Body',      val:-1},
  {id:'energized',    label:'Energized',      emoji:'⚡', group:'Body',      val:+1},

  // Lifestyle
  {id:'stress',       label:'Stressful day',  emoji:'😣', group:'Lifestyle', val:-1},
  {id:'travel',       label:'Travel',         emoji:'✈️', group:'Lifestyle', val:0 },
  {id:'big_meal',     label:'Big meal',       emoji:'🍽️', group:'Lifestyle', val:0 },
  {id:'late_meal',    label:'Late meal',      emoji:'🌙', group:'Lifestyle', val:-1},
  {id:'alcohol',      label:'Alcohol',        emoji:'🍷', group:'Lifestyle', val:-1},
  {id:'caffeine_late',label:'Caffeine late',  emoji:'☕', group:'Lifestyle', val:-1},
  {id:'hydrated',     label:'Hydrated well',  emoji:'💧', group:'Lifestyle', val:+1},

  // Wellness
  {id:'sauna',        label:'Sauna',          emoji:'🔥', group:'Wellness',  val:+1},
  {id:'meditation',   label:'Meditation',     emoji:'🧘', group:'Wellness',  val:+1},
  {id:'outdoors',     label:'Walk outdoors',  emoji:'🚶', group:'Wellness',  val:+1},
  {id:'sunlight',     label:'Sunlight',       emoji:'☀️', group:'Wellness',  val:+1}
];

// Group ordering
var GROUP_ORDER = ['Sleep','Body','Lifestyle','Wellness','Custom'];

// ════════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════════
var offset = 0;
var selectedTags = []; // array of tag IDs
var noteVal = '';
var currentPeriod = 7;

function getCustomTags(){ return DB.get('custom_journal_tags') || []; }
function saveCustomTags(list){ DB.set('custom_journal_tags', list); }

// Look up a tag by id, searching core list + custom tags
function findTag(id){
  var t = TAGS.find(function(x){ return x.id === id; });
  if (t) return t;
  var customs = getCustomTags();
  return customs.find(function(x){ return x.id === id; });
}

function dayKey(){ return DB.dayKey(offset); }
function dateLabel(off){
  if (off === 0) return 'Today';
  if (off === -1) return 'Yesterday';
  var d = new Date();
  d.setDate(d.getDate() + off);
  return d.toLocaleDateString('en-AU',{day:'numeric',month:'short'});
}

// ════════════════════════════════════════════════════════════
// RENDER: tag picker
// ════════════════════════════════════════════════════════════
function renderTagPicker(){
  var container = document.getElementById('tagGroups');
  container.innerHTML = '';

  // Group tags
  var groups = {};
  TAGS.forEach(function(t){
    if (!groups[t.group]) groups[t.group] = [];
    groups[t.group].push(t);
  });
  var customs = getCustomTags();
  if (customs.length) groups['Custom'] = customs;

  GROUP_ORDER.forEach(function(groupName){
    if (!groups[groupName]) return;
    var groupEl = document.createElement('div');
    groupEl.className = 'tag-group';
    var inner = '<div class="tag-group-label">' + groupName + '</div><div class="tag-row">';
    groups[groupName].forEach(function(t){
      var isSel = selectedTags.indexOf(t.id) >= 0;
      var valenceClass = (t.val > 0) ? 'pos' : (t.val < 0) ? 'neg' : '';
      inner += '<div class="tag' + (isSel ? ' selected ' + valenceClass : '') + '" data-tagid="' + t.id + '">' +
               '<span class="tag-emoji">' + t.emoji + '</span>' + t.label + '</div>';
    });
    inner += '</div>';
    groupEl.innerHTML = inner;
    container.appendChild(groupEl);
  });

  // Wire click handlers
  container.querySelectorAll('.tag').forEach(function(el){
    el.addEventListener('click', function(){
      var id = el.dataset.tagid;
      var idx = selectedTags.indexOf(id);
      if (idx >= 0) selectedTags.splice(idx, 1);
      else selectedTags.push(id);
      renderTagPicker();
    });
  });
}

// ════════════════════════════════════════════════════════════
// LOAD: existing entry for current date offset
// ════════════════════════════════════════════════════════════
function loadEntry(){
  var entry = DB.getJournal(dayKey());
  selectedTags = entry ? (entry.tags || []).slice() : [];
  noteVal = entry ? (entry.note || '') : '';
  document.getElementById('noteInput').value = noteVal;
  document.getElementById('dateLabel').textContent = dateLabel(offset);
  renderTagPicker();
}

// ════════════════════════════════════════════════════════════
// SAVE
// ════════════════════════════════════════════════════════════
document.getElementById('saveBtn').addEventListener('click', function(){
  var note = document.getElementById('noteInput').value.trim();
  if (selectedTags.length === 0 && !note) {
    var st = document.getElementById('saveStatus');
    st.textContent = 'Pick at least one tag or write a note';
    st.className = 'save-status';
    setTimeout(function(){ st.textContent = ''; }, 2500);
    return;
  }
  DB.saveJournalEntry({tags: selectedTags.slice(), note: note}, dayKey());
  var st = document.getElementById('saveStatus');
  st.textContent = '✓ Entry saved for ' + dateLabel(offset);
  st.className = 'save-status success';
  setTimeout(function(){ st.textContent = ''; st.className = 'save-status'; }, 2500);
  renderHistory();
  renderFrequency();
});

document.getElementById('clearBtn').addEventListener('click', function(){
  if (selectedTags.length === 0 && !document.getElementById('noteInput').value) return;
  if (!confirm('Clear all tags and note for ' + dateLabel(offset) + '?')) return;
  selectedTags = [];
  document.getElementById('noteInput').value = '';
  // Save empty entry so the day shows as "logged with nothing" rather than untouched
  // Actually — better to delete the entry entirely. We use set to null:
  DB.set('journal_' + dayKey(), null);
  renderTagPicker();
  renderHistory();
  renderFrequency();
});

document.getElementById('noteInput').addEventListener('input', function(){
  noteVal = this.value;
});

// ════════════════════════════════════════════════════════════
// CUSTOM TAG ADD
// ════════════════════════════════════════════════════════════
document.getElementById('customTagBtn').addEventListener('click', addCustomTag);
document.getElementById('customTagInput').addEventListener('keydown', function(e){
  if (e.key === 'Enter') addCustomTag();
});

function addCustomTag(){
  var inp = document.getElementById('customTagInput');
  var label = inp.value.trim();
  if (!label) return;
  var id = 'custom_' + label.toLowerCase().replace(/[^a-z0-9]/g,'_').slice(0,20) + '_' + Date.now().toString(36);
  var customs = getCustomTags();
  // Avoid dupes by label
  if (customs.some(function(t){ return t.label.toLowerCase() === label.toLowerCase(); })) {
    inp.value = '';
    return;
  }
  customs.push({id:id, label:label, emoji:'🔖', group:'Custom', val:0});
  saveCustomTags(customs);
  selectedTags.push(id); // auto-select the new tag
  inp.value = '';
  renderTagPicker();
}

// ════════════════════════════════════════════════════════════
// DATE NAV
// ════════════════════════════════════════════════════════════
document.getElementById('prevDay').addEventListener('click', function(){
  offset--;
  loadEntry();
});
document.getElementById('nextDay').addEventListener('click', function(){
  if (offset < 0) { offset++; loadEntry(); }
});

// ════════════════════════════════════════════════════════════
// HISTORY: day-by-day list
// ════════════════════════════════════════════════════════════
function renderHistory(){
  var list = document.getElementById('historyList');
  list.innerHTML = '';
  var today = new Date();
  var any = false;
  for (var i = 0; i < currentPeriod; i++) {
    var d = new Date();
    d.setDate(today.getDate() - i);
    var key = DB.dateToKey(d);
    var entry = DB.getJournal(key);
    var row = document.createElement('div');
    var isToday = (i === 0);
    var hasContent = entry && ((entry.tags && entry.tags.length) || entry.note);
    row.className = 'hist-entry' + (isToday ? ' today' : '') + (!hasContent ? ' empty' : '');

    var dow = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()];
    var labelText = isToday ? 'Today' : (i === 1 ? 'Yesterday' : d.getDate() + ' ' + ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()]);

    var inner = '<div class="hist-top"><div class="hist-date">' + labelText + '</div><div class="hist-dow">' + dow + '</div></div>';

    if (hasContent) {
      any = true;
      if (entry.tags && entry.tags.length) {
        inner += '<div class="hist-tags">';
        entry.tags.forEach(function(tid){
          var t = findTag(tid);
          if (!t) return;
          var cls = (t.val > 0) ? 'pos' : (t.val < 0) ? 'neg' : '';
          inner += '<span class="hist-tag ' + cls + '"><span class="te">' + t.emoji + '</span>' + t.label + '</span>';
        });
        inner += '</div>';
      }
      if (entry.note) {
        inner += '<div class="hist-note">' + escapeHTML(entry.note) + '</div>';
      }
    } else {
      inner += '<div class="hist-empty-msg">Not logged</div>';
    }

    row.innerHTML = inner;
    list.appendChild(row);
  }
  if (!any) {
    list.innerHTML = '<div class="empty-state">No entries in this period yet.<br>Start tagging your day above.</div>';
  }
}

function escapeHTML(s){
  return String(s).replace(/[&<>"']/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}

// ════════════════════════════════════════════════════════════
// FREQUENCY: count tag occurrences across the period
// ════════════════════════════════════════════════════════════
function renderFrequency(){
  var counts = {}; // {tagId: count}
  for (var i = 0; i < currentPeriod; i++) {
    var d = new Date();
    d.setDate(d.getDate() - i);
    var entry = DB.getJournal(DB.dateToKey(d));
    if (!entry || !entry.tags) continue;
    entry.tags.forEach(function(tid){
      counts[tid] = (counts[tid] || 0) + 1;
    });
  }
  var sorted = Object.keys(counts).map(function(id){
    return {tag: findTag(id), count: counts[id]};
  }).filter(function(x){ return x.tag; })
    .sort(function(a,b){ return b.count - a.count; })
    .slice(0, 10);

  var el = document.getElementById('freqList');
  if (!sorted.length) {
    el.innerHTML = '<div class="empty-state">Nothing tagged in this period yet.</div>';
    return;
  }
  var max = sorted[0].count;
  el.innerHTML = '';
  sorted.forEach(function(item){
    var pct = (item.count / max) * 100;
    var t = item.tag;
    var cls = (t.val > 0) ? 'pos' : (t.val < 0) ? 'neg' : '';
    var row = document.createElement('div');
    row.className = 'freq-row';
    row.innerHTML =
      '<div class="freq-label"><span>' + t.emoji + '</span>' + t.label + '</div>' +
      '<div class="freq-bar-track"><div class="freq-bar-fill ' + cls + '" style="width:' + pct + '%"></div></div>' +
      '<div class="freq-count">' + item.count + '</div>';
    el.appendChild(row);
  });
}

// ════════════════════════════════════════════════════════════
// TAB SWITCHER
// ════════════════════════════════════════════════════════════
document.querySelectorAll('.tab').forEach(function(btn){
  btn.addEventListener('click', function(){
    document.querySelectorAll('.tab').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
    currentPeriod = parseInt(btn.dataset.period);
    renderHistory();
    renderFrequency();
  });
});

loadEntry();
renderHistory();
renderFrequency();
</script>
