<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dave · Workout</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;900&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#141110;--s1:#1b1712;--s2:#211c16;--s3:#2b241b;--border:#322a20;--border2:#463a2b;--accent:#e8622b;--adim:rgba(232,98,43,0.12);--green:#8ec63f;--gdim:rgba(142,198,63,0.12);--orange:#e8843b;--odim:rgba(232,132,59,0.12);--yellow:#f0a92b;--ydim:rgba(240,169,43,0.12);--red:#ef4d4d;--rdim:rgba(239,77,77,0.12);--purple:#c9954a;--pdim:rgba(201,149,74,0.12);--blue:#3ea6c4;--bdim:rgba(62,166,196,0.12);--teal:#2fb59e;--tdim:rgba(47,181,158,0.12);--text:#efe7da;--muted:#8a8177;--muted2:#4a4237;--disp:'Archivo',sans-serif;--mono:'Space Mono',monospace;--sans:'Inter',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;padding-bottom:90px}
.nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(7,9,13,0.95);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:10px 0 max(10px,env(safe-area-inset-bottom))}
.nav-link{display:flex;flex-direction:column;align-items:center;gap:4px;text-decoration:none;color:var(--muted);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;padding:6px 10px;border-radius:10px;transition:color 0.2s}
.nav-link svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.nav-link.active,.nav-link:hover{color:var(--purple)}
.wrap{max-width:600px;margin:0 auto;padding:20px 16px}
.page-header{padding:20px 0 20px;display:flex;justify-content:space-between;align-items:center;gap:8px}
.page-header h1{font-family:'Archivo',sans-serif;font-weight:900;font-size:38px;letter-spacing:2px}
.header-right{display:flex;align-items:center;gap:8px}
.history-link{display:inline-flex;align-items:center;gap:6px;background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:8px 12px;color:var(--purple);text-decoration:none;font-family:'Inter',sans-serif;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;transition:all 0.2s}
.history-link:hover{background:var(--pdim);border-color:var(--purple)}
.history-link svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.date-nav{display:flex;align-items:center;gap:8px;background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:7px 12px}
.date-nav button{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;transition:color 0.2s}
.date-nav button:hover{color:var(--purple)}
.dlabel{font-family:'Space Mono',monospace;font-size:11px;color:var(--text);min-width:60px;text-align:center}
.card-title{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--purple);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.card-title::after{content:'';flex:1;height:1px;background:var(--border)}
.session-banner{background:var(--s1);border:1px solid var(--border);border-radius:18px;padding:18px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:12px;transition:border-color 0.3s}
.session-banner.active{border-color:rgba(179,136,255,0.3)}
.sb-left .sb-label{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.sb-left .sb-name{font-family:'Archivo',sans-serif;font-weight:900;font-size:26px;color:var(--purple);line-height:1}
.sb-left .sb-meta{font-size:11px;color:var(--muted);margin-top:4px}
.sb-left .sb-stale{font-size:10px;color:var(--yellow);margin-top:3px;letter-spacing:1px}
.sb-right{display:flex;gap:8px;flex-shrink:0}
.sb-btn{background:var(--s2);border:1px solid var(--border2);border-radius:10px;padding:9px 14px;font-family:'Inter',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all 0.2s;letter-spacing:1px}
.sb-btn.purple{color:var(--purple)} .sb-btn.purple:hover{background:var(--pdim);border-color:var(--purple)}
.sb-btn.red{color:var(--red)} .sb-btn.red:hover{background:var(--rdim);border-color:var(--red)}
.sb-btn.green{color:var(--green);background:var(--gdim);border-color:var(--green)}
.templates-card{background:var(--s1);border:1px solid var(--border);border-radius:18px;padding:18px;margin-bottom:14px}
.template-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.tpl-btn{background:var(--s2);border:1px solid var(--border);border-radius:12px;padding:14px;cursor:pointer;transition:all 0.2s;text-align:left}
.tpl-btn:hover{border-color:var(--purple);background:var(--pdim)}
.tpl-btn.active{border-color:var(--purple);background:var(--pdim)}
.tpl-icon{font-size:22px;margin-bottom:6px}
.tpl-name{font-family:'Archivo',sans-serif;font-weight:900;font-size:18px;color:var(--text);letter-spacing:1px;line-height:1;margin-bottom:3px}
.tpl-desc{font-size:10px;color:var(--muted);line-height:1.4}
.exercises-card{background:var(--s1);border:1px solid var(--border);border-radius:18px;padding:18px;margin-bottom:14px}
.exercise-list{display:flex;flex-direction:column;gap:10px;margin-bottom:14px}
.exercise-block{background:var(--s2);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.exercise-block.cardio{border-color:rgba(255,214,0,0.2)}
.ex-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--border)}
.ex-name{font-size:14px;font-weight:700;color:var(--text)}
.ex-category{font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:2px}
.exercise-block.cardio .ex-category{color:var(--yellow)}
.ex-actions{display:flex;gap:6px}
.ex-act-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;padding:3px 6px;border-radius:6px;transition:all 0.2s}
.ex-act-btn:hover{color:var(--red);background:var(--rdim)}
.sets-table{width:100%;padding:8px 14px 12px}
.sets-header{display:grid;grid-template-columns:28px 1fr 1fr 1fr 30px;gap:6px;font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;padding:0 2px}
.set-row{display:grid;grid-template-columns:28px 1fr 1fr 1fr 30px;gap:6px;align-items:center;margin-bottom:5px}
.set-num{font-family:'Space Mono',monospace;font-size:12px;color:var(--muted);text-align:center}
.set-input{background:var(--s3);border:1px solid var(--border2);border-radius:7px;padding:7px 8px;color:var(--text);font-family:'Space Mono',monospace;font-size:13px;text-align:center;outline:none;width:100%;transition:border-color 0.2s}
.set-input:focus{border-color:var(--purple)}
.set-done{width:28px;height:28px;border-radius:7px;border:1px solid var(--border2);background:none;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;color:var(--muted)}
.set-done.checked{background:var(--green);border-color:var(--green);color:var(--bg)}
.add-set-btn{background:none;border:1px dashed var(--border2);border-radius:8px;padding:7px;width:100%;color:var(--muted);font-size:12px;cursor:pointer;transition:all 0.2s;font-family:'Inter',sans-serif}
.add-set-btn:hover{border-color:var(--purple);color:var(--purple)}
.cardio-block{padding:14px}
.cardio-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:12px}
.cardio-time{font-family:'Archivo',sans-serif;font-weight:900;font-size:44px;color:var(--yellow);line-height:1;letter-spacing:2px;min-width:140px}
.cardio-time.running{color:var(--green)}
.cardio-start-btn{flex:1;max-width:160px;background:var(--green);color:var(--bg);border:none;border-radius:10px;padding:14px;font-family:'Archivo',sans-serif;font-weight:900;font-size:18px;letter-spacing:2px;cursor:pointer;transition:all 0.2s}
.cardio-start-btn.running{background:var(--red);color:var(--bg)}
.cardio-start-btn:hover{opacity:0.85}
.cardio-manual{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.cardio-field{background:var(--s3);border:1px solid var(--border2);border-radius:8px;padding:10px;display:flex;flex-direction:column;gap:4px}
.cardio-field-label{font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.cardio-field-input{background:none;border:none;color:var(--text);font-family:'Space Mono',monospace;font-size:14px;outline:none;padding:0;width:100%}
.cardio-field-input:focus{color:var(--yellow)}
.cardio-done-row{display:flex;align-items:center;gap:10px;margin-top:8px}
.cardio-done-btn{flex:1;background:var(--s3);border:1px solid var(--border2);border-radius:8px;padding:9px;color:var(--muted);font-family:'Inter',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all 0.2s}
.cardio-done-btn.checked{background:var(--green);border-color:var(--green);color:var(--bg)}
.cardio-hint{font-size:10px;color:var(--muted);margin-top:6px}
.add-ex-card{background:var(--s1);border:1px solid var(--border);border-radius:18px;padding:18px;margin-bottom:14px}
.ex-search{width:100%;background:var(--s2);border:1px solid var(--border2);border-radius:10px;padding:10px 13px;color:var(--text);font-family:'Inter',sans-serif;font-size:13px;outline:none;transition:border-color 0.2s;margin-bottom:10px}
.ex-search:focus{border-color:var(--purple)}
.ex-search::placeholder{color:var(--muted)}
.ex-suggestions{display:flex;flex-direction:column;gap:6px;max-height:220px;overflow-y:auto}
.ex-suggestions::-webkit-scrollbar{width:2px} .ex-suggestions::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}
.ex-suggestion{display:flex;align-items:center;justify-content:space-between;background:var(--s2);border:1px solid var(--border);border-radius:9px;padding:10px 12px;cursor:pointer;transition:all 0.2s}
.ex-suggestion:hover{border-color:var(--purple);background:var(--pdim)}
.exs-left .exs-name{font-size:13px;font-weight:600;color:var(--text)}
.exs-left .exs-cat{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.exs-add{font-size:18px;color:var(--purple)}
.custom-ex-row{display:flex;gap:8px;margin-top:8px}
.custom-ex-input{flex:1;background:var(--s2);border:1px solid var(--border2);border-radius:10px;padding:9px 12px;color:var(--text);font-family:'Inter',sans-serif;font-size:13px;outline:none}
.custom-ex-input:focus{border-color:var(--purple)}
.custom-ex-input::placeholder{color:var(--muted)}
.custom-ex-btn{background:var(--purple);color:var(--bg);border:none;border-radius:10px;padding:9px 14px;font-family:'Archivo',sans-serif;font-weight:900;font-size:15px;letter-spacing:1px;cursor:pointer;white-space:nowrap;transition:opacity 0.2s}
.custom-ex-btn:hover{opacity:0.85}

/* ── REST TIMER BAR ── timestamp-based, survives background */
.rest-timer-bar{position:fixed;top:0;left:0;right:0;z-index:300;background:var(--s1);border-bottom:2px solid var(--purple);padding:10px 16px;display:none;align-items:center;justify-content:space-between;gap:12px}
.rest-timer-bar.active{display:flex}
.rt-label{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--purple)}
.rt-time{font-family:'Archivo',sans-serif;font-weight:900;font-size:28px;color:var(--text);line-height:1}
.rt-progress{flex:1;height:4px;background:var(--border);border-radius:99px;overflow:hidden}
.rt-bar{height:100%;background:var(--purple);border-radius:99px;transition:width 0.25s linear}
.rt-skip{background:none;border:1px solid var(--border2);border-radius:8px;padding:6px 12px;color:var(--muted);font-size:12px;cursor:pointer;transition:all 0.2s;font-family:'Inter',sans-serif}
.rt-skip:hover{color:var(--red);border-color:var(--red)}

.chart-card{background:var(--s1);border:1px solid var(--border);border-radius:18px;padding:18px;margin-bottom:14px}
.chart-container{position:relative;height:140px;margin-top:8px}
.chart-svg{width:100%;height:100%}
.chart-label{font-family:'Space Mono',monospace;font-size:9px;fill:var(--muted)}
.hiit-timer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:500;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.hiit-timer-overlay.active{display:flex}
.hiit-phase{font-size:11px;letter-spacing:4px;text-transform:uppercase;margin-bottom:12px}
.hiit-phase.work{color:var(--red)}
.hiit-phase.rest{color:var(--green)}
.hiit-phase.get-ready{color:var(--yellow)}
.hiit-big-time{font-family:'Archivo',sans-serif;font-weight:900;font-size:120px;line-height:1;letter-spacing:4px}
.hiit-big-time.work{color:var(--red)}
.hiit-big-time.rest{color:var(--green)}
.hiit-big-time.get-ready{color:var(--yellow)}
.hiit-exercise-name{font-family:'Archivo',sans-serif;font-weight:900;font-size:32px;color:var(--text);letter-spacing:2px;margin-bottom:8px}
.hiit-next{font-size:12px;color:var(--muted);margin-bottom:24px}
.hiit-round-info{font-family:'Space Mono',monospace;font-size:14px;color:var(--muted);margin-bottom:32px}
.hiit-progress-track{width:280px;height:6px;background:var(--border);border-radius:99px;overflow:hidden;margin-bottom:32px}
.hiit-progress-fill{height:100%;border-radius:99px;transition:width 0.1s linear}
.hiit-controls{display:flex;gap:12px}
.hiit-ctrl-btn{background:var(--s2);border:1px solid var(--border2);border-radius:12px;padding:12px 24px;font-family:'Archivo',sans-serif;font-weight:900;font-size:18px;letter-spacing:2px;cursor:pointer;transition:all 0.2s}
.hiit-ctrl-btn.stop{color:var(--red);border-color:rgba(255,61,113,0.3)}
.hiit-ctrl-btn.skip{color:var(--accent);border-color:rgba(0,229,255,0.3)}
.hiit-ctrl-btn:hover{opacity:0.8}
.tpl-btn.hiit{border-color:rgba(255,61,113,0.2)}
.tpl-btn.hiit:hover{border-color:var(--red);background:rgba(255,61,113,0.08)}
.tpl-btn.hiit .tpl-name{color:var(--red)}
.tpl-btn.hyrox{border-color:rgba(255,61,113,0.3);background:linear-gradient(135deg,rgba(255,61,113,0.04),rgba(255,107,53,0.04))}
.tpl-btn.hyrox:hover{border-color:var(--red);background:linear-gradient(135deg,rgba(255,61,113,0.1),rgba(255,107,53,0.1))}
.tpl-btn.hyrox .tpl-name{color:var(--red);background:linear-gradient(90deg,var(--red),var(--orange));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.tpl-btn.outdoor{border-color:rgba(255,214,0,0.25)}
.tpl-btn.outdoor:hover{border-color:var(--yellow);background:rgba(255,214,0,0.08)}
.tpl-btn.outdoor .tpl-name{color:var(--yellow)}
.tpl-badge{display:inline-block;font-size:8px;letter-spacing:1px;text-transform:uppercase;padding:2px 6px;border-radius:4px;margin-top:4px;font-family:'Space Mono',monospace}
.tpl-badge.hiit-badge{background:rgba(255,61,113,0.15);color:var(--red)}
.tpl-badge.cardio-badge{background:rgba(255,214,0,0.15);color:var(--yellow)}
.tpl-badge.hyrox-badge{background:rgba(255,107,53,0.15);color:var(--orange)}
.finish-btn{width:100%;background:linear-gradient(135deg,var(--purple),var(--accent));color:var(--bg);border:none;border-radius:14px;padding:16px;font-family:'Archivo',sans-serif;font-weight:900;font-size:22px;letter-spacing:3px;cursor:pointer;transition:opacity 0.2s;margin-bottom:14px}
.finish-btn:hover{opacity:0.88}
.empty-workout{text-align:center;padding:30px;color:var(--muted);font-size:13px;line-height:2}

/* ── VIEW TOGGLE ── */
.view-tabs{display:flex;gap:6px;margin-bottom:16px}
.view-tab{flex:1;padding:9px 6px;border-radius:10px;border:1px solid var(--border);background:var(--s1);color:var(--muted);font-family:'Inter',sans-serif;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all .2s;text-align:center}
.view-tab.active{background:var(--pdim);border-color:var(--purple);color:var(--purple)}

/* ── PROGRAMME PANEL ── */
#programmePanel{display:none}
.prog-header-card{background:var(--s1);border:1px solid var(--border);border-radius:18px;padding:18px;margin-bottom:14px}
.prog-title{font-family:'Archivo',sans-serif;font-weight:900;font-size:22px;letter-spacing:2px;color:var(--text);margin-bottom:4px}
.prog-desc{font-size:11px;color:var(--muted);line-height:1.5;margin-bottom:14px}
.prog-pips{display:flex;gap:5px;margin-bottom:8px}
.prog-pip{width:32px;height:32px;border-radius:50%;background:var(--s2);border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--muted);font-family:'Space Mono',monospace}
.prog-pip.done{background:var(--green);border-color:var(--green);color:var(--bg)}
.prog-pip.active{background:var(--purple);border-color:var(--purple);color:var(--bg);box-shadow:0 0 12px rgba(179,136,255,.4)}
.prog-pip-label{font-size:11px;color:var(--muted);font-family:'Space Mono',monospace}
.prog-week-tabs{display:flex;gap:6px;margin-bottom:14px}
.prog-week-tab{flex:1;padding:9px;border-radius:10px;border:1px solid var(--border);background:var(--s1);color:var(--muted);font-family:'Inter',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all .2s;text-align:center}
.prog-week-tab.active{background:var(--pdim);border-color:var(--purple);color:var(--purple)}
.prog-day-card{background:var(--s1);border:1px solid var(--border);border-radius:14px;margin-bottom:8px;overflow:hidden}
.prog-day-card.today-day{border-color:rgba(179,136,255,.4)}
.prog-day-summary{padding:13px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;border-left:4px solid transparent;list-style:none;user-select:none}
.prog-day-summary::-webkit-details-marker{display:none}
.prog-day-name{font-size:13px;font-weight:700;color:var(--text)}
.prog-day-focus{font-size:11px;color:var(--muted);margin-top:2px}
.prog-day-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.prog-badge{font-size:9px;font-weight:800;letter-spacing:.08em;padding:3px 9px;border-radius:20px;color:var(--bg);white-space:nowrap}
.prog-dur{font-size:10px;color:var(--muted)}
.prog-chevron{color:var(--muted);font-size:10px;transition:transform .2s}
details[open] .prog-chevron{transform:rotate(180deg)}
.prog-day-body{padding:0 12px 12px;overflow-x:auto}
.prog-ex-table{width:100%;border-collapse:collapse;font-size:11px;color:var(--text);margin-top:6px}
.prog-ex-table th{text-align:left;padding:5px 7px;color:var(--muted);font-size:9px;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border);font-weight:600}
.prog-ex-table td{padding:7px 7px;border-bottom:1px solid var(--border2);vertical-align:top}
.prog-ex-table tbody tr:last-child td{border-bottom:none}
.prog-ex-header-row td{color:var(--muted);font-style:italic;font-size:10px;padding:4px 7px;background:var(--s2)}
.prog-ex-note{color:var(--muted);font-style:italic}
.prog-log-btn{margin-top:10px;width:100%;padding:11px;background:var(--purple);color:var(--bg);border:none;border-radius:10px;font-family:'Archivo',sans-serif;font-weight:900;font-size:16px;letter-spacing:2px;cursor:pointer;transition:background .2s}
.prog-log-btn:disabled{background:var(--green);cursor:default}
.prog-today-card{background:var(--s2);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:14px;border-left:4px solid var(--purple)}
/* ── SESSION LOGGING INPUTS ── */
.prog-log-section{margin-top:14px;border-top:1px solid var(--border);padding-top:14px}
.prog-log-section-title{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--purple);margin-bottom:10px}
.prog-ex-log-row{display:grid;grid-template-columns:1fr 80px 80px;gap:6px;align-items:center;margin-bottom:6px}
.prog-ex-log-name{font-size:11px;color:var(--muted);line-height:1.3}
.prog-ex-log-input{background:var(--s3);border:1px solid var(--border2);border-radius:7px;padding:7px 8px;color:var(--text);font-family:'Space Mono',monospace;font-size:12px;text-align:center;outline:none;width:100%;transition:border-color .2s}
.prog-ex-log-input:focus{border-color:var(--purple)}
.prog-ex-log-header{font-size:9px;color:var(--muted);text-align:center;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}

let offset=0,activeSession=null;
let cardioTimerState=null;

// ═══════════════════════════════════════════════════════════
// REST TIMER — timestamp-based so it's always correct
// even when the screen is locked or the app is in the background.
// ═══════════════════════════════════════════════════════════
const REST_KEY = 'dw_rest_timer';
let restInterval = null;

function saveRestTimer(endTime, total) {
  try { localStorage.setItem(REST_KEY, JSON.stringify({endTime, total})); } catch(e) {}
}
function loadRestTimer() {
  try { var r = localStorage.getItem(REST_KEY); return r ? JSON.parse(r) : null; } catch(e) { return null; }
}
function clearRestTimer() {
  try { localStorage.removeItem(REST_KEY); } catch(e) {}
}

function startRestTimer(seconds) {
  stopRestTimer();
  var endTime = Date.now() + seconds * 1000;
  saveRestTimer(endTime, seconds);
  showRestBar(endTime, seconds);
}

function resumeRestTimer() {
  var saved = loadRestTimer();
  if (!saved) return;
  var remaining = Math.round((saved.endTime - Date.now()) / 1000);
  if (remaining <= 0) { clearRestTimer(); return; }
  showRestBar(saved.endTime, saved.total);
}

function showRestBar(endTime, total) {
  document.getElementById('restTimer').classList.add('active');
  document.getElementById('mainWrap').style.paddingTop = '68px';

  function update() {
    var remaining = Math.max(0, Math.round((endTime - Date.now()) / 1000));
    var m = Math.floor(remaining / 60), s = remaining % 60;
    document.getElementById('rtTime').textContent = m + ':' + s.toString().padStart(2,'0');
    document.getElementById('rtBar').style.width = (remaining / total * 100) + '%';
    if (remaining <= 0) { stopRestTimer(); }
  }
  update();
  restInterval = setInterval(update, 250); // poll 4x/sec — catches up instantly on resume
}

function stopRestTimer() {
  if (restInterval) { clearInterval(restInterval); restInterval = null; }
  clearRestTimer();
  document.getElementById('restTimer').classList.remove('active');
  document.getElementById('mainWrap').style.paddingTop = '';
}

document.getElementById('rtSkip').addEventListener('click', stopRestTimer);

// ═══════════════════════════════════════════════════════════
// WORKOUT SESSION PERSISTENCE
// ═══════════════════════════════════════════════════════════
function dayKey(){return DB.dayKey(offset)}
function getWorkouts(){return DB.get('workouts_'+dayKey())||[]}
function saveWorkouts(w){DB.set('workouts_'+dayKey(),w)}
function dateLabel(off){if(off===0)return'Today';if(off===-1)return'Yesterday';const d=new Date();d.setDate(d.getDate()+off);return d.toLocaleDateString('en-AU',{day:'numeric',month:'short'});}

const ACTIVE_KEY='active_workout';
function loadActiveSession(){try{return DB._ls(ACTIVE_KEY)||null;}catch(e){return null;}}
function persistActiveSession(){
  if(activeSession){DB._ls(ACTIVE_KEY,activeSession);}
  else{try{localStorage.removeItem('dw_'+ACTIVE_KEY);}catch(e){}}
}
function isStaleSession(session){
  if(!session||!session.startTime)return false;
  const started=DB.dateToKey(new Date(session.startTime));
  const today=DB.dayKey();
  return started!==today;
}

function renderTemplates(){
  const grid=document.getElementById('templateGrid');
  grid.innerHTML='';
  TEMPLATES.forEach(t=>{
    const isHiit=t.type==='hiit';
    const isCardio=t.type==='cardio';
    const isHyrox=t.type==='hyrox';
    const isOutdoor=t.id==='outdoor_walk'||t.id==='outdoor_run';
    const badgeClass=isHyrox?'hyrox-badge':isHiit?'hiit-badge':isCardio?'cardio-badge':'strength-badge';
    const badgeLabel=isHyrox?'HYROX':isHiit?'TIMED':isCardio?'CARDIO':'STRENGTH';
    const btn=document.createElement('div');
    btn.className='tpl-btn'+(isHiit?' hiit':'')+(isHyrox?' hyrox':'')+(isOutdoor?' outdoor':'');
    btn.innerHTML=`<div class="tpl-icon">${t.icon}</div><div class="tpl-name">${t.name}</div><div class="tpl-desc">${t.desc}</div><div class="tpl-badge ${badgeClass}">${badgeLabel}</div>`;
    btn.addEventListener('click',()=>startSession(t));
    grid.appendChild(btn);
  });
}

function newExerciseForSession(name){
  const meta=exerciseMeta(name);
  if(meta.cat==='Cardio'||meta.cat==='Hyrox'){
    return {name:meta.name,category:meta.cat,cardio:true,durationSec:0,distanceKm:'',done:false,startedAt:null};
  }
  return {name:meta.name,category:meta.cat,sets:[{reps:'',weight:'',done:false}]};
}

function startSession(template){
  if(template.type==='hiit'&&template.exercises.length>0){
    startHIITTimer(template);
    return;
  }
  if(activeSession){
    const ok=confirm('You already have an active '+activeSession.name+' session. Start a new one? Current progress will be lost.');
    if(!ok)return;
  }
  activeSession={
    id:Date.now(),
    name:template.name,
    templateId:template.id,
    type:template.type,
    startTime:new Date().toISOString(),
    exercises:template.exercises.map(name=>newExerciseForSession(name))
  };
  persistActiveSession();
  updateSessionUI();
}

function updateSessionUI(){
  const hasSession=!!activeSession;
  document.getElementById('exercisesCard').style.display=hasSession?'block':'none';
  document.getElementById('addExCard').style.display=hasSession?'block':'none';
  document.getElementById('finishBtn').style.display=hasSession?'block':'none';
  document.getElementById('sessionBanner').className='session-banner'+(hasSession?' active':'');
  const staleEl=document.getElementById('sbStale');
  if(hasSession&&isStaleSession(activeSession)){
    const started=new Date(activeSession.startTime);
    const label=started.toLocaleDateString('en-AU',{weekday:'short',day:'numeric',month:'short'});
    staleEl.textContent='⚠ Started '+label+' — finish or cancel to clear';
    staleEl.style.display='block';
  } else {
    staleEl.style.display='none';
  }
  if(hasSession){
    document.getElementById('sbName').textContent=activeSession.name;
    const exCount=activeSession.exercises.length;
    const logged=activeSession.exercises.reduce((a,ex)=>{
      if(ex.cardio)return a+(ex.done?1:0);
      return a+(ex.sets||[]).filter(s=>s.done).length;
    },0);
    document.getElementById('sbMeta').textContent=`${exCount} exercises · ${logged} logged`;
    document.getElementById('sbBtns').innerHTML=`<button class="sb-btn red" id="cancelSessionBtn">CANCEL</button>`;
    document.getElementById('cancelSessionBtn').addEventListener('click',cancelSession);
    renderExercises();
  } else {
    document.getElementById('sbName').textContent='NO SESSION';
    document.getElementById('sbMeta').textContent='Tap a template or start custom';
    document.getElementById('sbBtns').innerHTML=`<button class="sb-btn purple" id="startCustomBtn">+ CUSTOM</button>`;
    document.getElementById('startCustomBtn').addEventListener('click',()=>startSession({name:'CUSTOM',icon:'✏️',templateId:'custom',type:'strength',exercises:[]}));
  }
}

function formatSecs(s){
  s=Math.max(0,Math.floor(s));
  const h=Math.floor(s/3600);
  const m=Math.floor((s%3600)/60);
  const ss=s%60;
  if(h>0)return h+':'+String(m).padStart(2,'0')+':'+String(ss).padStart(2,'0');
  return String(m).padStart(2,'0')+':'+String(ss).padStart(2,'0');
}

      block.innerHTML=`

            </div>
            ${meta.hasDistance?`
            <div class="cardio-field">
              <span class="cardio-field-label">Distance (km)</span>
              <input class="cardio-field-input" type="number" step="0.01" min="0" placeholder="0.0" value="${ex.distanceKm||''}" data-exidx="${exIdx}" data-cardio-field="distance">

    } else {
      block.innerHTML=`
        <div class="ex-header">

  });

  list.querySelectorAll('.set-input').forEach(inp=>{
    inp.addEventListener('input',()=>{
      const {ex,set,field}=inp.dataset;
      activeSession.exercises[ex].sets[set][field]=inp.value;
      persistActiveSession();
    });
  });
  list.querySelectorAll('.set-done').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const {ex,set}=btn.dataset;
      const s=activeSession.exercises[ex].sets[set];
      s.done=!s.done;
      btn.className='set-done'+(s.done?' checked':'');
      btn.textContent=s.done?'✓':'○';
      if(s.done&&s.weight&&s.reps){
        DB.set('pb_'+activeSession.exercises[ex].name.replace(/\s/g,'_'),{weight:s.weight,reps:s.reps});
        startRestTimer(90); // ← uses timestamp-based timer
      }
      persistActiveSession();
      updateSessionUI();
    });
  });
  list.querySelectorAll('.add-set-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const exIdx=parseInt(btn.dataset.exidx);
      activeSession.exercises[exIdx].sets.push({reps:'',weight:'',done:false});
      persistActiveSession();
      renderExercises();
    });
  });
  list.querySelectorAll('.ex-act-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const exIdx=parseInt(btn.dataset.exidx);
      if(cardioTimerState&&cardioTimerState.exIdx===exIdx)stopCardioTimer();
      activeSession.exercises.splice(exIdx,1);
      if(cardioTimerState&&cardioTimerState.exIdx>exIdx)cardioTimerState.exIdx--;
      persistActiveSession();
      renderExercises();updateSessionUI();
    });
  });

  list.querySelectorAll('.cardio-start-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const exIdx=parseInt(btn.dataset.exidx);
      const ex=activeSession.exercises[exIdx];
      if(ex.startedAt){
        stopCardioTimer();
      } else {
        if(cardioTimerState)stopCardioTimer();
        ex.startedAt=new Date().toISOString();
        persistActiveSession();
        startCardioTimerTick(exIdx);
      }
    });
  });
  list.querySelectorAll('[data-cardio-field]').forEach(inp=>{
    inp.addEventListener('input',()=>{
      const exIdx=parseInt(inp.dataset.exidx);
      const field=inp.dataset.cardioField;
      const ex=activeSession.exercises[exIdx];
      if(field==='duration'){
        const mins=parseFloat(inp.value)||0;
        ex.durationSec=Math.round(mins*60);
        const timeEl=document.getElementById('cardioTime-'+exIdx);
        if(timeEl&&!ex.startedAt)timeEl.textContent=formatSecs(ex.durationSec);
      } else if(field==='distance'){
        ex.distanceKm=inp.value;
      }
      persistActiveSession();
    });
  });
  list.querySelectorAll('.cardio-done-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const exIdx=parseInt(btn.dataset.exidx);
      const ex=activeSession.exercises[exIdx];
      if(ex.startedAt)stopCardioTimer();
      ex.done=!ex.done;
      persistActiveSession();
      renderExercises();updateSessionUI();
    });
  });

  // Resume any running cardio timer after re-render
  if(cardioTimerState){
    startCardioTimerTick(cardioTimerState.exIdx);
  } else {
    activeSession.exercises.forEach((ex,i)=>{
      if(ex.startedAt&&!cardioTimerState)startCardioTimerTick(i);
    });
  }
}

function startCardioTimerTick(exIdx){
  if(cardioTimerState&&cardioTimerState.intervalId)clearInterval(cardioTimerState.intervalId);
  cardioTimerState={exIdx,intervalId:null};
  const update=()=>{
    if(!activeSession)return stopCardioTimer();
    const ex=activeSession.exercises[exIdx];
    if(!ex||!ex.cardio||!ex.startedAt)return stopCardioTimer();
    // Always computed from timestamp — correct after screen lock
    const liveSec=ex.durationSec+Math.floor((Date.now()-new Date(ex.startedAt).getTime())/1000);
    const timeEl=document.getElementById('cardioTime-'+exIdx);
    if(timeEl){timeEl.textContent=formatSecs(liveSec);timeEl.classList.add('running');}
  };
  update();
  cardioTimerState.intervalId=setInterval(update,1000);
}

function stopCardioTimer(){
  if(!cardioTimerState)return;
  const {exIdx,intervalId}=cardioTimerState;
  if(intervalId)clearInterval(intervalId);
  if(activeSession){
    const ex=activeSession.exercises[exIdx];
    if(ex&&ex.startedAt){
      const elapsed=Math.floor((Date.now()-new Date(ex.startedAt).getTime())/1000);
      ex.durationSec+=elapsed;
      ex.startedAt=null;
      persistActiveSession();
    }
  }
  cardioTimerState=null;
  renderExercises();
  updateSessionUI();
}

function cancelSession(){
  const hasProgress=activeSession&&activeSession.exercises.some(ex=>{
    if(ex.cardio)return ex.done||ex.durationSec>0||ex.distanceKm;
    return (ex.sets||[]).some(s=>s.done||s.weight||s.reps);
  });
  if(hasProgress){if(!confirm('Cancel this workout? All logged work will be lost.'))return;}
  if(cardioTimerState)stopCardioTimer();
  stopRestTimer();
  activeSession=null;
  persistActiveSession();
  updateSessionUI();
}

function finishSession(){
  if(!activeSession)return;
  if(cardioTimerState)stopCardioTimer();
  stopRestTimer();
  activeSession.endTime=new Date().toISOString();
  const duration=Math.round((new Date(activeSession.endTime)-new Date(activeSession.startTime))/60000);
  activeSession.duration=duration;
  const startedKey=DB.dateToKey(new Date(activeSession.startTime));
  const workouts=DB.get('workouts_'+startedKey)||[];
  workouts.push(activeSession);
  DB.set('workouts_'+startedKey,workouts);
  activeSession=null;
  persistActiveSession();
  updateSessionUI();
  renderChart();
  alert(`Workout saved! ${duration} min session logged. 💪`);
}

// HIIT (uses its own internal tick — screen usually stays on for HIIT)
let hiitInterval=null;
let hiitState={};
function startHIITTimer(template){
  hiitState={template,exercises:template.exercises,workOn:template.workOn||40,workRest:template.workRest||20,totalRounds:template.rounds||3,currentRound:1,currentExIdx:0,phase:'getready',timeLeft:5,totalTime:5};
  document.getElementById('hiitOverlay').classList.add('active');
  runHIITTick();
  hiitInterval=setInterval(runHIITTick,1000);
}
function runHIITTick(){
  const s=hiitState;
  const phaseEl=document.getElementById('hiitPhase');
  const bigTime=document.getElementById('hiitBigTime');
  const exName=document.getElementById('hiitExName');
  const nextEl=document.getElementById('hiitNext');
  const roundInfo=document.getElementById('hiitRoundInfo');
  const progressFill=document.getElementById('hiitProgressFill');
  if(s.timeLeft<=0){
    if(s.phase==='getready'){s.phase='work';s.timeLeft=s.workOn;s.totalTime=s.workOn;}
    else if(s.phase==='work'){s.phase='rest';s.timeLeft=s.workRest;s.totalTime=s.workRest;}
    else if(s.phase==='rest'){
      s.currentExIdx++;
      if(s.currentExIdx>=s.exercises.length){s.currentExIdx=0;s.currentRound++;}
      if(s.currentRound>s.totalRounds){stopHIITTimer(true);return;}
      s.phase='work';s.timeLeft=s.workOn;s.totalTime=s.workOn;
    }
  }
  const ex=s.exercises[s.currentExIdx];
  const nextExIdx=s.currentExIdx+1<s.exercises.length?s.currentExIdx+1:0;
  const nextEx=s.exercises[nextExIdx];
  if(s.phase==='getready'){phaseEl.className='hiit-phase get-ready';phaseEl.textContent='GET READY';bigTime.className='hiit-big-time get-ready';progressFill.style.background='var(--yellow)';exName.textContent=ex;nextEl.textContent='Starting in...';}
  else if(s.phase==='work'){phaseEl.className='hiit-phase work';phaseEl.textContent='WORK';bigTime.className='hiit-big-time work';progressFill.style.background='var(--red)';exName.textContent=ex;nextEl.textContent='Next: REST '+s.workRest+'s';}
  else if(s.phase==='rest'){phaseEl.className='hiit-phase rest';phaseEl.textContent='REST';bigTime.className='hiit-big-time rest';progressFill.style.background='var(--green)';exName.textContent='REST';nextEl.textContent='Next: '+nextEx;}
  bigTime.textContent=s.timeLeft;
  roundInfo.textContent='Round '+s.currentRound+' of '+s.totalRounds+' · Exercise '+(s.currentExIdx+1)+' of '+s.exercises.length;
  progressFill.style.width=(s.timeLeft/s.totalTime*100)+'%';
  s.timeLeft--;
}
function stopHIITTimer(completed){
  if(hiitInterval){clearInterval(hiitInterval);hiitInterval=null;}
  document.getElementById('hiitOverlay').classList.remove('active');
  if(completed){
    const t=hiitState.template;
    const session={id:Date.now(),name:t.name,templateId:t.id,type:'hiit',startTime:new Date(Date.now()-(t.exercises.length*t.totalRounds*(t.workOn+t.workRest)*1000)).toISOString(),endTime:new Date().toISOString(),duration:Math.round(t.exercises.length*t.totalRounds*(t.workOn+t.workRest)/60),exercises:t.exercises.map(name=>({name,category:'HIIT',sets:[{reps:t.totalRounds,weight:0,done:true}]}))};
    const workouts=getWorkouts();workouts.push(session);saveWorkouts(workouts);
    renderChart();
    alert(`HIIT Complete! 🔥 ${session.duration} min session logged.`);
  }
  hiitState={};
}
document.getElementById('hiitStop').addEventListener('click',()=>stopHIITTimer(false));
document.getElementById('hiitSkip').addEventListener('click',()=>{hiitState.timeLeft=0;});

function renderChart(){
  const svg=document.getElementById('volumeChart');
  const days=7,w=svg.clientWidth||340,h=130,pad={t:10,r:10,b:24,l:36};
  const chartW=w-pad.l-pad.r,chartH=h-pad.t-pad.b;
  const data=[];const labels=[];
  for(let i=6;i>=0;i--){
    const k=DB.dayKey(-i);
    const workouts=DB.get('workouts_'+k)||[];
    let vol=0;
    workouts.forEach(sess=>sess.exercises?.forEach(ex=>{
      if(ex.cardio)return;
      (ex.sets||[]).forEach(s=>{if(s.done&&s.weight&&s.reps)vol+=parseFloat(s.weight)*parseInt(s.reps);});
    }));
    data.push(vol);
    const d=new Date();d.setDate(d.getDate()-i);
    labels.push(['S','M','T','W','T','F','S'][d.getDay()]);
  }
  const max=Math.max(...data,1);
  const barW=Math.floor(chartW/days*0.5);
  const gap=chartW/days;
  let html='';
  [0,0.5,1].forEach(frac=>{
    const y=pad.t+chartH*(1-frac);
    html+=`<line x1="${pad.l}" y1="${y}" x2="${pad.l+chartW}" y2="${y}" stroke="#1e2a3a" stroke-width="1"/>`;
    if(frac>0)html+=`<text x="${pad.l-4}" y="${y+3}" class="chart-label" text-anchor="end">${Math.round(max*frac/1000)}k</text>`;
  });
  data.forEach((v,i)=>{
    const x=pad.l+gap*i+(gap-barW)/2;
    const barH=Math.max(v/max*chartH,v>0?4:0);
    const y=pad.t+chartH-barH;
    const isToday=i===6;
    html+=`<rect x="${x}" y="${y}" width="${barW}" height="${barH}" rx="4" fill="${isToday?'var(--purple)':'var(--border2)'}"/>`;
    html+=`<text x="${x+barW/2}" y="${pad.t+chartH+16}" class="chart-label" text-anchor="middle" fill="${isToday?'var(--purple)':'var(--muted)'}">${labels[i]}</text>`;
  });
  svg.innerHTML=html;
}

document.addEventListener('visibilitychange', function() {
  if (!document.hidden) {
    // Force rest timer display to catch up immediately
    // (the interval will have been throttled while backgrounded)
    var saved = loadRestTimer();
    if (saved && restInterval) {
      var remaining = Math.round((saved.endTime - Date.now()) / 1000);
      if (remaining <= 0) {
        stopRestTimer();
      } else {
        var m = Math.floor(remaining / 60), s = remaining % 60;
        document.getElementById('rtTime').textContent = m + ':' + s.toString().padStart(2,'0');
        document.getElementById('rtBar').style.width = (remaining / saved.total * 100) + '%';
      }
    }
  }
});

const PROG_METRICS_DEF = [
  {key:'weight',  label:'Body Weight', unit:'kg',  placeholder:'122'},
  {key:'bench',   label:'Bench Press', unit:'kg',  placeholder:'—'},
  {key:'squat',   label:'Back Squat',  unit:'kg',  placeholder:'—'},
  {key:'deadlift',label:'Deadlift',    unit:'kg',  placeholder:'—'},
  {key:'pullup',  label:'Pull-Up Max', unit:'reps', placeholder:'—'},
  {key:'hyrox',   label:'Hyrox Score', unit:'time', placeholder:'—'},
];

function progCurrentWeek() {
  const ms = Date.now() - PROG_START.getTime();
  if (ms < 0) return 0; // Not started yet
  const weekNum = Math.min(8, Math.floor(ms / (7*24*60*60*1000)) + 1);
  return weekNum;
}

function progWeekTemplate(weekNum) {
  // Week A = odd (1,3,5,7), Week B = even (2,4,6,8)
  return PROG_WEEKS[(weekNum % 2 === 1) ? 0 : 1];
}

function progExTable(exercises) {
  if (!exercises || !exercises.length) return '';
  const hasNotes = exercises.some(e => e.notes);
  return `<table class="prog-ex-table">
    <thead><tr>
      <th>Exercise</th><th>Sets</th><th>Reps / Time</th><th>Rest</th>
      ${hasNotes ? '<th>Notes</th>' : ''}
    </tr></thead>
    <tbody>
    ${exercises.map(ex => !ex.sets ? '' : ex.sets === '' ?
      `<tr class="prog-ex-header-row"><td colspan="${hasNotes?5:4}">${ex.name}</td></tr>` :
      `<tr>
        <td>${ex.name}</td>
        <td>${ex.sets}</td>
        <td>${ex.reps}</td>
        <td>${ex.rest}</td>
        ${hasNotes ? `<td class="prog-ex-note">${ex.notes}</td>` : ''}
      </tr>`
    ).join('')}
    </tbody>
  </table>`;
}

function progLogSession(weekNum, dayName, badge, type) {
  // Collect whatever input fields are visible
  const key = 'prog_log_w' + weekNum;
  const log = DB.get(key) || {};
  const entry = { badge, type, ts: new Date().toISOString() };

  if (type === 'strength') {
    // Collect per-exercise weight + reps
    const exData = [];
    document.querySelectorAll('.prog-ex-log-row[data-exidx]').forEach(row => {
      const idx = row.dataset.exidx;
      const wt = document.getElementById('prog_wt_'+idx);
      const rp = document.getElementById('prog_rp_'+idx);
      const nm = document.getElementById('prog_nm_'+idx);
      if (nm) exData.push({ name: nm.value, weight: wt?wt.value:'', reps: rp?rp.value:'' });
    });
    entry.exercises = exData;
  } else if (type === 'hiit' || type === 'hyrox') {
    entry.score = (document.getElementById('prog_score_' + weekNum + '_' + dayName) || {}).value || '';
    entry.notes = (document.getElementById('prog_notes_' + weekNum + '_' + dayName) || {}).value || '';
  } else if (type === 'cardio') {
    entry.activity = (document.getElementById('prog_cardio_act_' + weekNum + '_' + dayName) || {}).value || '';
    entry.duration = (document.getElementById('prog_cardio_dur_' + weekNum + '_' + dayName) || {}).value || '';
    entry.notes = (document.getElementById('prog_notes_' + weekNum + '_' + dayName) || {}).value || '';
  }

  log[dayName] = entry;
  DB.set(key, log);
  renderProgramme();
}

function progSessionLogForm(session, weekNum, logEntry) {
  // Returns the logging UI HTML appropriate to session type
  const dn = session.day;
  const wn = weekNum;
  const sid = wn + '_' + dn;

  if (logEntry) {
    // Already logged — show summary
    let summary = `<div style="margin-top:12px;padding:10px 12px;background:var(--gdim);border:1px solid var(--green);border-radius:10px">
      <div style="font-size:10px;color:var(--green);font-family:'Space Mono',monospace;letter-spacing:1px">✅ LOGGED ${new Date(logEntry.ts).toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit'})}</div>`;
    if (logEntry.exercises && logEntry.exercises.length) {
      summary += `<div style="margin-top:8px;font-size:11px;color:var(--muted)">`;
      logEntry.exercises.filter(e=>e.weight||e.reps).forEach(e => {
        summary += `<div style="padding:2px 0">${e.name}: <span style="color:var(--text);font-family:'Space Mono',monospace">${e.weight?e.weight+'kg':'—'} × ${e.reps||'—'}</span></div>`;
      });
      summary += `</div>`;
    }
    if (logEntry.score) summary += `<div style="margin-top:6px;font-size:13px;color:var(--text);font-family:'Space Mono',monospace">Score: ${logEntry.score}</div>`;
    if (logEntry.activity) summary += `<div style="margin-top:6px;font-size:13px;color:var(--text);font-family:'Space Mono',monospace">${logEntry.activity} · ${logEntry.duration||'—'} min</div>`;
    if (logEntry.notes) summary += `<div style="margin-top:4px;font-size:11px;color:var(--muted)">${logEntry.notes}</div>`;
    summary += `</div>`;
    return summary;
  }

  // Not yet logged — show entry form
  let form = `<div class="prog-log-section">`;

  if (session.type === 'strength') {
    form += `<div class="prog-log-section-title">Log Your Sets</div>`;
    form += `<div style="display:grid;grid-template-columns:1fr 80px 80px;gap:6px;margin-bottom:4px">
      <div class="prog-ex-log-header" style="text-align:left">Exercise</div>
      <div class="prog-ex-log-header">Weight kg</div>
      <div class="prog-ex-log-header">Reps</div>
    </div>`;
    session.exercises.filter(ex => ex.sets && ex.sets !== '').forEach((ex, i) => {
      form += `<div class="prog-ex-log-row" data-exidx="${i}">
        <div class="prog-ex-log-name" id="prog_nm_${i}" data-name="${ex.name}">${ex.name}<input type="hidden" id="prog_nm_${i}" value="${ex.name}"></div>
        <input class="prog-ex-log-input" id="prog_wt_${i}" type="number" step="0.5" min="0" placeholder="kg">
        <input class="prog-ex-log-input" id="prog_rp_${i}" type="number" min="0" placeholder="reps">
      </div>`;
    });
    form += `<textarea class="prog-notes-input" id="prog_notes_${sid}" rows="2" placeholder="Any notes — PBs, how it felt…"></textarea>`;

  } else if (session.type === 'hiit') {
    form += `<div class="prog-log-section-title">Log Your Score</div>`;
    form += `<div class="prog-score-field">
      <div class="prog-score-label">Rounds / Score</div>
      <input class="prog-score-input" id="prog_score_${sid}" type="text" placeholder="e.g. 4 rounds, 58:22, 3+12 reps">
      <div class="prog-score-hint">AMRAP → rounds completed · Tabata → total reps · Hyrox → finish time</div>
    </div>
    <textarea class="prog-notes-input" id="prog_notes_${sid}" rows="2" placeholder="How'd it go? HR, effort level…"></textarea>`;

  } else if (session.type === 'cardio') {
    form += `<div class="prog-log-section-title">Log Your Cardio</div>`;
    form += `<div class="prog-cardio-grid">
      <div class="prog-score-field">
        <div class="prog-score-label">Activity</div>
        <input class="prog-score-input" id="prog_cardio_act_${sid}" type="text" placeholder="Beach walk, treadmill…" style="font-size:14px">
      </div>
      <div class="prog-score-field">
        <div class="prog-score-label">Duration (min)</div>
        <input class="prog-score-input" id="prog_cardio_dur_${sid}" type="number" min="0" placeholder="30">
      </div>
    </div>
    <textarea class="prog-notes-input" id="prog_notes_${sid}" rows="2" placeholder="HR zone, felt good/bad…"></textarea>`;
  }

  form += `<button class="prog-log-btn" onclick="progLogSession(${wn},'${dn}','${session.badge}','${session.type}')">✅ LOG THIS SESSION</button>`;
  form += `</div>`;
  return form;
}

let progActiveWeek = 0; // 0 = Week A, 1 = Week B

function renderProgramme() {
  const currentWeekNum = progCurrentWeek();
  const todayName = new Date().toLocaleDateString('en-AU', {weekday:'long'});
  const displayWeekIdx = progActiveWeek;
  const week = PROG_WEEKS[displayWeekIdx];
  const logWeekNum = currentWeekNum > 0 ? currentWeekNum : 1;
  const log = DB.get('prog_log_w' + logWeekNum) || {};

  const pips = [1,2,3,4,5,6,7,8].map(w => {
    const done = w < currentWeekNum;
    const active = w === currentWeekNum;
    return `<div class="prog-pip ${done?'done':active?'active':''}">${w}</div>`;
  }).join('');

  let html = `
    <div class="prog-header-card">
      <div class="prog-title">8-WEEK STRENGTH BLOCK</div>
      <div class="prog-desc">14-day alternating split. Week A = 4-day strength. Week B = 3-day strength + 2 HIIT. Starts 22 June 2026.</div>
      <div class="prog-pips">${pips}</div>
      <div class="prog-pip-label">${currentWeekNum < 1 ? 'Starts 22 Jun 2026' : currentWeekNum > 8 ? '✅ Programme Complete!' : 'Week ' + currentWeekNum + ' of 8 — ' + (currentWeekNum%2===1?'Week A':'Week B')}</div>
    </div>

    <div class="prog-week-tabs">
      <button class="prog-week-tab ${displayWeekIdx===0?'active':''}" onclick="progActiveWeek=0;renderProgramme()">Week A — Odd weeks</button>
      <button class="prog-week-tab ${displayWeekIdx===1?'active':''}" onclick="progActiveWeek=1;renderProgramme()">Week B — Even weeks</button>
    </div>

    <div style="font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--purple);margin-bottom:10px">${week.subtitle}</div>`;

  week.days.forEach(session => {
    const isToday = (session.day === todayName) && (displayWeekIdx === (currentWeekNum%2===1?0:1));
    const logEntry = log[session.day] || null;
    const isLogged = !!logEntry;
    html += `
      <details class="prog-day-card ${isToday?'today-day':''}" ${isToday?'open':''}>
        <summary class="prog-day-summary" style="border-left-color:${session.color}">
          <div>
            <div class="prog-day-name">${isLogged?'✅ ':isToday?'📍 ':''}${session.day}</div>
            <div class="prog-day-focus">${session.focus}</div>
          </div>
          <div class="prog-day-right">
            <span class="prog-badge" style="background:${session.color}">${session.badge}</span>
            <span class="prog-dur">${session.duration}</span>
            <span class="prog-chevron">▾</span>
          </div>
        </summary>
        <div class="prog-day-body">
          ${progExTable(session.exercises)}
          ${progSessionLogForm(session, logWeekNum, logEntry)}
        </div>
      </details>`;
  });

  document.getElementById('progContent').innerHTML = html;
}

// ═══════════════════════════════════════════════════════════
// PROGRAMME HISTORY + METRICS
// ═══════════════════════════════════════════════════════════
function saveProgMetrics(weekNum) {
  const data = {};
  PROG_METRICS_DEF.forEach(m => {
    const el = document.getElementById('pm_' + weekNum + '_' + m.key);
    if (el) data[m.key] = el.value;
  });
  DB.set('prog_metrics_w' + weekNum, data);
  const btn = document.getElementById('pm_save_' + weekNum);
  if (btn) { btn.textContent = '✅ SAVED'; btn.className = 'hist-save-btn saved'; }
}

function renderProgHistory() {
  const currentWeekNum = Math.max(1, progCurrentWeek());
  const totalWeeks = Math.min(currentWeekNum, 8);
  let html = '';

  if (currentWeekNum < 1) {
    html = '<div class="hist-empty">Programme starts 19 June 2026.<br>Come back then to track your progress.</div>';
    document.getElementById('histContent').innerHTML = html;
    return;
  }

  for (let w = 1; w <= totalWeeks; w++) {
    const weekTemplate = progWeekTemplate(w);
    const log = DB.get('prog_log_w' + w) || {};
    const metrics = DB.get('prog_metrics_w' + w) || {};
    const isCurrentWeek = w === currentWeekNum;

    // Day chips
    const chips = weekTemplate.days.map(session => {
      const done = !!log[session.day];
      const isRest = session.type === 'cardio';
      return `<div class="hist-day-chip ${done?'done':isRest?'rest':''}">
        <span class="hist-chip-day">${session.day.slice(0,2)}</span>
        <span class="hist-chip-badge" style="background:${session.color}">${session.badge.slice(0,3)}</span>
        <span class="hist-chip-tick">${done?'✅':'○'}</span>
      </div>`;
    }).join('');

    // Sessions count
    const sessCount = Object.keys(log).length;

    // Metrics inputs
    const metricsHtml = `
      <div class="hist-metrics-title">Week ${w} Metrics ${isCurrentWeek?'(current)':''}</div>
      <div class="hist-metrics-grid">
        ${PROG_METRICS_DEF.map(m => `
          <div class="hist-metric-field">
            <div class="hist-metric-label">${m.label} <span class="hist-metric-unit">(${m.unit})</span></div>
            <input class="hist-metric-input" id="pm_${w}_${m.key}" type="text" placeholder="${m.placeholder}" value="${metrics[m.key]||''}">
          </div>`).join('')}
      </div>
      <button class="hist-save-btn" id="pm_save_${w}" onclick="saveProgMetrics(${w})">SAVE METRICS</button>`;

    html += `
      <div class="hist-week-card">
        <div class="hist-week-header">
          <div>
            <div class="hist-week-label">WEEK ${w}</div>
            <div class="hist-week-sub">${weekTemplate.label} · ${sessCount}/7 sessions logged</div>
          </div>
          ${isCurrentWeek ? '<span style="font-size:10px;color:var(--purple);font-family:\'DM Mono\',monospace;letter-spacing:1px">▶ CURRENT</span>' : ''}
        </div>
        <div class="hist-days-row">${chips}</div>
        ${metricsHtml}
      </div>`;
  }

  document.getElementById('histContent').innerHTML = html;
}
