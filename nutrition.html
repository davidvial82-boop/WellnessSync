<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dave - Nutrition</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#07090d;--s1:#0d1117;--s2:#131920;--s3:#1a2233;--border:#1e2a3a;--border2:#253248;--accent:#00e5ff;--adim:rgba(0,229,255,0.1);--green:#00ff88;--orange:#ff6b35;--yellow:#ffd600;--red:#ff3d71;--rdim:rgba(255,61,113,0.1);--purple:#b388ff;--text:#e2e8f5;--muted:#4a5c78;--muted2:#2e3d54}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;padding-bottom:90px}
.nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(7,9,13,0.95);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:10px 0 max(10px,env(safe-area-inset-bottom))}
.nav-link{display:flex;flex-direction:column;align-items:center;gap:4px;text-decoration:none;color:var(--muted);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;padding:6px 14px;border-radius:10px;transition:color 0.2s}
.nav-link svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.nav-link.active,.nav-link:hover{color:var(--accent)}
.wrap{max-width:600px;margin:0 auto;padding:20px 16px}
.page-header{padding:20px 0 20px;display:flex;justify-content:space-between;align-items:center}
.page-header h1{font-family:'Bebas Neue',sans-serif;font-size:38px;letter-spacing:2px}
.date-nav{display:flex;align-items:center;gap:8px;background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:7px 12px}
.date-nav button{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;transition:color 0.2s;padding:0 2px}
.date-nav button:hover{color:var(--accent)}
.dlabel{font-family:'DM Mono',monospace;font-size:11px;color:var(--text);min-width:60px;text-align:center}
.snap{background:var(--s1);border:1px solid var(--border);border-radius:18px;padding:20px;margin-bottom:14px;position:relative;overflow:hidden}
.snap::before{content:'';position:absolute;top:-50px;right:-50px;width:180px;height:180px;background:radial-gradient(circle,rgba(0,229,255,0.05),transparent 70%);pointer-events:none}
.snap-top{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:14px}
.snap-cal{font-family:'Bebas Neue',sans-serif;font-size:64px;color:var(--accent);line-height:1;letter-spacing:2px}
.snap-right{text-align:right}
.snap-rem{font-family:'Bebas Neue',sans-serif;font-size:30px;color:var(--green);line-height:1}
.snap-rem.over{color:var(--red)}
.snap-remlabel{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase}
.bar-track{height:8px;background:var(--border);border-radius:99px;overflow:hidden;margin-bottom:14px}
.bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--green));transition:width 0.7s ease;max-width:100%}
.bar-fill.over{background:linear-gradient(90deg,var(--orange),var(--red))}
.macro-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.mpill{background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:10px 12px}
.mpill .mp-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.mpill .mpl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
.mpill .mpv{font-family:'Bebas Neue',sans-serif;font-size:20px;line-height:1}
.mpill .mpv.p{color:var(--green)} .mpill .mpv.c{color:#7eb8ff} .mpill .mpv.f{color:var(--orange)}
.mpill .mpbar{height:3px;background:var(--border);border-radius:99px;overflow:hidden}
.mpill .mpbf{height:100%;border-radius:99px;max-width:100%;transition:width 0.6s ease}
.mpill .mpbf.p{background:var(--green)} .mpill .mpbf.c{background:#7eb8ff} .mpill .mpbf.f{background:var(--orange)}
.mpill .mpsub{font-size:9px;color:var(--muted);margin-top:3px}
.log-card{background:var(--s1);border:1px solid var(--border);border-radius:18px;padding:18px;margin-bottom:14px}
.card-title{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--accent);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.card-title::after{content:'';flex:1;height:1px;background:var(--border)}
.food-search{width:100%;background:var(--s2);border:1px solid var(--border2);border-radius:10px;padding:12px 13px;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;outline:none;transition:border-color 0.2s;margin-bottom:6px}
.food-search:focus{border-color:var(--accent)}
.food-search::placeholder{color:var(--muted)}
.search-status{font-size:11px;color:var(--accent);padding:2px;min-height:18px;margin-bottom:6px}
.results-list{display:flex;flex-direction:column;gap:6px;margin-bottom:8px;max-height:260px;overflow-y:auto}
.results-list::-webkit-scrollbar{width:2px} .results-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}
.result-item{background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:11px 13px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:space-between;gap:10px}
.result-item:hover{border-color:var(--accent);background:rgba(0,229,255,0.05)}
.result-left{flex:1;min-width:0}
.result-name{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.result-brand{font-size:10px;color:var(--muted);margin-top:2px}
.result-right{text-align:right;flex-shrink:0}
.result-cal{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--accent);line-height:1}
.result-pfc{font-size:9px;color:var(--muted);line-height:1.5}
.confirm-card{background:var(--s2);border:1px solid var(--border2);border-radius:12px;padding:14px;margin-bottom:10px;display:none}
.confirm-card.show{display:block}
.confirm-name{font-size:14px;font-weight:700;color:var(--text);margin-bottom:2px}
.confirm-brand{font-size:10px;color:var(--muted);margin-bottom:10px}
.confirm-macros{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px}
.cm{background:var(--s1);border-radius:8px;padding:8px 5px;text-align:center}
.cm .cmv{font-family:'Bebas Neue',sans-serif;font-size:20px;line-height:1}
.cm .cmv.cal{color:var(--accent)} .cm .cmv.p{color:var(--green)} .cm .cmv.c{color:#7eb8ff} .cm .cmv.f{color:var(--orange)}
.cm .cml{font-size:8px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:2px}
.serving-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:12px;color:var(--muted)}
.serving-inp{background:var(--s1);border:1px solid var(--border2);border-radius:8px;padding:7px 10px;color:var(--text);font-family:'DM Mono',monospace;font-size:14px;width:70px;text-align:center;outline:none}
.serving-inp:focus{border-color:var(--accent)}
.meal-select{width:100%;background:var(--s2);border:1px solid var(--border2);border-radius:10px;padding:9px 13px;color:var(--text);font-family:'Syne',sans-serif;font-size:13px;outline:none;cursor:pointer;margin-bottom:10px}
.meal-select option{background:var(--s2)}
.add-btn{width:100%;background:var(--green);color:var(--bg);border:none;border-radius:10px;padding:12px;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;cursor:pointer;transition:opacity 0.2s}
.add-btn:hover{opacity:0.85}
.scan-btn{width:100%;background:var(--s2);border:1px solid var(--border2);border-radius:10px;padding:10px;color:var(--accent);font-family:'Syne',sans-serif;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;letter-spacing:1px;transition:all 0.2s;margin-top:8px}
.scan-btn:hover{background:rgba(0,229,255,0.1);border-color:var(--accent)}
.log-status{font-size:11px;color:var(--muted);text-align:center;min-height:16px;margin-top:6px}
.log-status.success{color:var(--green)} .log-status.error{color:var(--red)}
.meal-bd{background:var(--s1);border:1px solid var(--border);border-radius:18px;padding:18px;margin-bottom:14px}
.meal-slots{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.mslot{background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:12px 10px}
.mslot .msn{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:2px}
.mslot .mst{font-size:9px;color:var(--muted2);margin-bottom:6px}
.mslot .msc{font-family:'Bebas Neue',sans-serif;font-size:24px;line-height:1;color:var(--text)}
.mslot .mstgt{font-size:9px;color:var(--muted)}
.mslot .msbar{height:3px;background:var(--border);border-radius:99px;margin-top:6px;overflow:hidden}
.mslot .msbf{height:100%;border-radius:99px;background:var(--accent);max-width:100%;transition:width 0.5s ease}
.entries-card{background:var(--s1);border:1px solid var(--border);border-radius:18px;padding:18px;margin-bottom:14px}
.entries-list{display:flex;flex-direction:column;gap:6px;max-height:320px;overflow-y:auto;padding-right:2px}
.entries-list::-webkit-scrollbar{width:2px} .entries-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}
.entry{display:flex;align-items:center;justify-content:space-between;background:var(--s2);border-radius:9px;padding:9px 11px;gap:8px;animation:slideIn 0.25s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
.entry-left{flex:1;min-width:0}
.entry-name{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.entry-tag{font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:1px}
.entry-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.entry-cal{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--accent);line-height:1}
.entry-pfc{font-size:9px;text-align:right;line-height:1.6}
.entry-del{background:none;border:none;color:var(--muted2);cursor:pointer;font-size:13px;padding:4px;border-radius:6px;transition:all 0.2s}
.entry-del:hover{color:var(--red);background:var(--rdim)}
.empty-state{text-align:center;padding:28px;color:var(--muted);font-size:13px;line-height:2}
.scanner-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:200;align-items:center;justify-content:center;padding:16px}
.scanner-overlay.active{display:flex}
.scanner-modal{background:var(--s1);border:1px solid var(--border2);border-radius:20px;padding:22px;width:100%;max-width:420px}
.smod-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.smod-hdr h3{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--accent)}
.smod-close{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:4px 8px;border-radius:8px;transition:all 0.2s}
.smod-close:hover{color:var(--red)}
.video-wrap{position:relative;width:100%;aspect-ratio:4/3;background:#000;border-radius:12px;overflow:hidden;margin-bottom:12px}
#scannerVideo{width:100%;height:100%;object-fit:cover;display:block}
.scan-line{position:absolute;left:10%;right:10%;height:2px;background:var(--accent);box-shadow:0 0 8px var(--accent);animation:scanMove 2s ease-in-out infinite;top:20%}
@keyframes scanMove{0%,100%{top:20%}50%{top:76%}}
.scan-corners{position:absolute;inset:10px;pointer-events:none}
.scan-corners::before,.scan-corners::after,.scan-corners span::before,.scan-corners span::after{content:'';position:absolute;width:18px;height:18px;border-color:var(--accent);border-style:solid}
.scan-corners::before{top:0;left:0;border-width:2px 0 0 2px} .scan-corners::after{top:0;right:0;border-width:2px 2px 0 0}
.scan-corners span::before{bottom:0;left:0;border-width:0 0 2px 2px} .scan-corners span::after{bottom:0;right:0;border-width:0 2px 2px 0}
.scanner-status{text-align:center;font-size:11px;color:var(--muted);margin-bottom:10px;min-height:16px;letter-spacing:1px}
.scanner-status.scanning{color:var(--accent)} .scanner-status.found{color:var(--green)} .scanner-status.error{color:var(--red)}
.manual-wrap{display:flex;gap:8px;margin-top:8px}
.manual-input{flex:1;background:var(--s2);border:1px solid var(--border2);border-radius:8px;padding:8px 10px;color:var(--text);font-family:'Syne',sans-serif;font-size:12px;outline:none}
.manual-input:focus{border-color:var(--accent)}
.manual-input::placeholder{color:var(--muted)}
.manual-btn{background:var(--s2);border:1px solid var(--border2);border-radius:8px;padding:8px 12px;color:var(--accent);font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap}
.manual-btn:hover{background:rgba(0,229,255,0.1)}
</style>
</head>

<script>
var DB={_cache:{},_base:"/.netlify/functions/data",dayKey:function(off){off=off||0;var d=new Date();d.setDate(d.getDate()+off);return d.toISOString().split("T")[0];},_ls:function(k,v){try{if(v===undefined)return JSON.parse(localStorage.getItem("dw_"+k)||"null");localStorage.setItem("dw_"+k,JSON.stringify(v));}catch(e){return null;}},get:function(k,cb){if(!cb)return this._ls(k);var self=this;var local=this._ls(k);fetch(this._base+"?key="+encodeURIComponent(k)).then(function(r){return r.json();}).then(function(d){var val=(d.value!==undefined&&d.value!==null)?d.value:local;self._ls(k,val);if(cb)cb(val);}).catch(function(){if(cb)cb(local);});},set:function(k,v,cb){this._ls(k,v);fetch(this._base,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({key:k,value:v})}).then(function(){if(cb)cb(true);}).catch(function(){if(cb)cb(false);});}};
var TARGETS={cal:2400,p:185,c:220,f:65};
var MEAL_TARGETS={'Breakfast':480,'Mid-Morning':280,'Lunch':560,'Pre-Workout':320,'Dinner':580,'Evening':180,'Other':0};
var MEAL_TIMES={'Breakfast':'7:00 AM','Mid-Morning':'10:00 AM','Lunch':'1:00 PM','Pre-Workout':'4:30 PM','Dinner':'7:00 PM','Evening':'9:00 PM','Other':'--'};
var offset=0,selectedProduct=null,searchTimer=null;
function dayKey(){return DB.dayKey(offset)}
function getNutrition(){return DB.get('nutrition_'+dayKey())||{entries:[]}}
function saveNutrition(d){DB.set('nutrition_'+dayKey(),d)}
function dateLabel(off){if(off===0)return 'Today';if(off===-1)return 'Yesterday';var d=new Date();d.setDate(d.getDate()+off);return d.toLocaleDateString('en-AU',{day:'numeric',month:'short'});}
function render(){
  document.getElementById('dateLabel').textContent=dateLabel(offset);
  var data=getNutrition();
  var t=data.entries.reduce(function(a,e){return{cal:a.cal+(e.cal||0),p:a.p+(e.p||0),c:a.c+(e.c||0),f:a.f+(e.f||0)}},{cal:0,p:0,c:0,f:0});
  document.getElementById('snapCal').textContent=Math.round(t.cal);
  var rem=TARGETS.cal-Math.round(t.cal);
  var remEl=document.getElementById('snapRem');
  remEl.textContent=Math.abs(rem);
  remEl.className='snap-rem'+(rem<0?' over':'');
  document.getElementById('snapRemLabel').textContent=rem<0?'OVER TARGET':'REMAINING';
  var bf=document.getElementById('calBarFill');
  bf.style.width=Math.min(t.cal/TARGETS.cal*100,100)+'%';
  bf.className='bar-fill'+(t.cal>TARGETS.cal?' over':'');
  ['p','c','f'].forEach(function(k){var v=Math.round(t[k]),tgt=TARGETS[k];document.getElementById('mp'+k.toUpperCase()).textContent=v+'g';document.getElementById('mp'+k.toUpperCase()+'b').style.width=Math.min(v/tgt*100,100)+'%';document.getElementById('mp'+k.toUpperCase()+'s').textContent=v+'/'+tgt+'g';});
  var ms=document.getElementById('mealSlots');ms.innerHTML='';
  ['Breakfast','Mid-Morning','Lunch','Pre-Workout','Dinner','Evening'].forEach(function(meal){var mc=data.entries.filter(function(e){return e.meal===meal}).reduce(function(s,e){return s+(e.cal||0)},0);var tgt=MEAL_TARGETS[meal],pct=tgt>0?Math.min(mc/tgt*100,100):0;var s=document.createElement('div');s.className='mslot';s.innerHTML='<div class="msn">'+meal+'</div><div class="mst">'+MEAL_TIMES[meal]+'</div><div class="msc">'+Math.round(mc)+'</div><div class="mstgt">tgt: '+tgt+'</div><div class="msbar"><div class="msbf" style="width:'+pct+'%"></div></div>';ms.appendChild(s);});
  var el=document.getElementById('entriesList');
  if(data.entries.length===0){el.innerHTML='<div class="empty-state">Nothing logged yet.<br>Search for a food above to get started.</div>';return;}
  el.innerHTML='';
  data.entries.slice().reverse().forEach(function(e,ri){var idx=data.entries.length-1-ri;var item=document.createElement('div');item.className='entry';item.innerHTML='<div class="entry-left"><div class="entry-name">'+e.name+'</div><div class="entry-tag">'+e.meal+'</div></div><div class="entry-right"><div><div class="entry-cal">'+Math.round(e.cal)+'</div><div style="font-size:8px;color:var(--muted)">kcal</div></div><div class="entry-pfc"><span style="color:var(--green)">'+Math.round(e.p)+'P</span><br><span style="color:#7eb8ff">'+Math.round(e.c)+'C</span><br><span style="color:var(--orange)">'+Math.round(e.f)+'F</span></div><button class="entry-del" data-idx="'+idx+'">X</button></div>';el.appendChild(item);});
  el.querySelectorAll('.entry-del').forEach(function(btn){btn.addEventListener('click',function(){var d=getNutrition();d.entries.splice(parseInt(btn.dataset.idx),1);saveNutrition(d);render();});});
}
function searchFood(query){
  if(!query||query.length<2){document.getElementById('resultsList').innerHTML='';document.getElementById('searchStatus').textContent='';return;}
  document.getElementById('searchStatus').textContent='Searching...';
  document.getElementById('resultsList').innerHTML='';
  fetch('/.netlify/functions/search?q='+encodeURIComponent(query))
  .then(function(r){return r.json()})
  .then(function(data){
    var products=(data.products||[]).filter(function(p){var n=p.nutriments||{};return p.product_name&&(n['energy-kcal_100g']||0)>0;});
    if(products.length===0){document.getElementById('searchStatus').textContent='No results. Try different search terms.';return;}
    document.getElementById('searchStatus').textContent=products.length+' results - tap one to select';
    var list=document.getElementById('resultsList');list.innerHTML='';
    products.forEach(function(p){
      var n=p.nutriments||{};
      var cal=Math.round(n['energy-kcal_100g']||0);
      var prot=Math.round((n['proteins_100g']||0)*10)/10;
      var carb=Math.round((n['carbohydrates_100g']||0)*10)/10;
      var fat=Math.round((n['fat_100g']||0)*10)/10;
      var item=document.createElement('div');item.className='result-item';
      item.innerHTML='<div class="result-left"><div class="result-name">'+(p.product_name||'Unknown')+'</div><div class="result-brand">'+(p.brands||'per 100g')+'</div></div><div class="result-right"><div class="result-cal">'+cal+'</div><div class="result-pfc">kcal/100g<br>'+prot+'P '+carb+'C '+fat+'F</div></div>';
      item.addEventListener('click',function(){selectProduct(p);});
      list.appendChild(item);
    });
  }).catch(function(){document.getElementById('searchStatus').textContent='Search failed. Check your connection.';});
}
function selectProduct(p){
  var n=p.nutriments||{};
  selectedProduct={name:p.product_name||'Unknown',brand:p.brands||'',per100:{cal:Math.round(n['energy-kcal_100g']||0),p:Math.round((n['proteins_100g']||0)*10)/10,c:Math.round((n['carbohydrates_100g']||0)*10)/10,f:Math.round((n['fat_100g']||0)*10)/10},servingSize:parseFloat(p.serving_size)||100};
  document.getElementById('confirmName').textContent=selectedProduct.name;
  document.getElementById('confirmBrand').textContent=selectedProduct.brand?'by '+selectedProduct.brand:'';
  document.getElementById('servingAmt').value=Math.round(selectedProduct.servingSize);
  updateConfirmMacros();
  document.getElementById('confirmCard').classList.add('show');
  document.getElementById('resultsList').innerHTML='';
  document.getElementById('searchStatus').textContent='';
  document.getElementById('foodSearch').value='';
}
function updateConfirmMacros(){
  if(!selectedProduct)return;
  var s=parseFloat(document.getElementById('servingAmt').value)||100,r=s/100,p=selectedProduct.per100;
  document.getElementById('cmCal').textContent=Math.round(p.cal*r);
  document.getElementById('cmP').textContent=Math.round(p.p*r*10)/10;
  document.getElementById('cmC').textContent=Math.round(p.c*r*10)/10;
  document.getElementById('cmF').textContent=Math.round(p.f*r*10)/10;
}
document.getElementById('servingAmt').addEventListener('input',updateConfirmMacros);
document.getElementById('addEntryBtn').addEventListener('click',function(){
  if(!selectedProduct)return;
  var s=parseFloat(document.getElementById('servingAmt').value)||100,r=s/100,p=selectedProduct.per100,meal=document.getElementById('mealSelect').value;
  var entry={name:selectedProduct.name.length>40?selectedProduct.name.slice(0,38)+'...':selectedProduct.name,cal:Math.round(p.cal*r),p:Math.round(p.p*r*10)/10,c:Math.round(p.c*r*10)/10,f:Math.round(p.f*r*10)/10,meal:meal,time:new Date().toISOString()};
  var d=getNutrition();d.entries.push(entry);saveNutrition(d);
  document.getElementById('confirmCard').classList.remove('show');
  selectedProduct=null;
  var st=document.getElementById('logStatus');st.textContent='Added: '+entry.name+' - '+entry.cal+' cal';st.className='log-status success';
  setTimeout(function(){st.textContent='';st.className='log-status';},3000);
  render();
});
document.getElementById('foodSearch').addEventListener('input',function(){clearTimeout(searchTimer);var q=this.value.trim();searchTimer=setTimeout(function(){searchFood(q);},500);});
document.getElementById('prevDay').addEventListener('click',function(){offset--;render();});
document.getElementById('nextDay').addEventListener('click',function(){if(offset<0){offset++;render();}});
var scannerStream=null,scannerActive=false,zxingReader=null;
function loadZXing(){return new Promise(function(res,rej){if(window.ZXing){res();return;}var s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/zxing-js/0.20.0/zxing.min.js';s.onload=res;s.onerror=rej;document.head.appendChild(s);});}
function openScanner(){
  document.getElementById('scannerOverlay').classList.add('active');
  document.getElementById('scannerStatus').textContent='Starting camera...';
  document.getElementById('scannerStatus').className='scanner-status scanning';
  loadZXing().then(function(){return navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});}).then(function(stream){scannerStream=stream;var v=document.getElementById('scannerVideo');v.srcObject=stream;return v.play();}).then(function(){scannerActive=true;document.getElementById('scannerStatus').textContent='Point camera at a barcode';zxingReader=new ZXing.BrowserMultiFormatReader();zxingReader.decodeFromVideoElement(document.getElementById('scannerVideo'),function(result){if(!scannerActive||!result)return;scannerActive=false;lookupBarcode(result.getText());});}).catch(function(e){document.getElementById('scannerStatus').textContent=e.name==='NotAllowedError'?'Camera denied - use manual entry':'Camera unavailable - use manual entry';document.getElementById('scannerStatus').className='scanner-status error';});
}
function lookupBarcode(barcode){
  document.getElementById('scannerStatus').textContent='Looking up...';document.getElementById('scannerStatus').className='scanner-status scanning';
  fetch('https://world.openfoodfacts.org/api/v0/product/'+barcode+'.json').then(function(r){return r.json();}).then(function(data){if(data.status!==1||!data.product){document.getElementById('scannerStatus').textContent='Not found - try manual entry';document.getElementById('scannerStatus').className='scanner-status error';scannerActive=true;return;}closeScanner();selectProduct(data.product);}).catch(function(){document.getElementById('scannerStatus').textContent='Lookup failed';document.getElementById('scannerStatus').className='scanner-status error';scannerActive=true;});
}
function closeScanner(){scannerActive=false;if(zxingReader){try{zxingReader.reset();}catch(e){}zxingReader=null;}if(scannerStream){scannerStream.getTracks().forEach(function(t){t.stop();});scannerStream=null;}document.getElementById('scannerVideo').srcObject=null;document.getElementById('scannerOverlay').classList.remove('active');document.getElementById('manualBarcodeInput').value='';}
document.getElementById('openScannerBtn').addEventListener('click',openScanner);
document.getElementById('closeScannerBtn').addEventListener('click',closeScanner);
document.getElementById('scannerOverlay').addEventListener('click',function(e){if(e.target===document.getElementById('scannerOverlay'))closeScanner();});
document.getElementById('manualLookupBtn').addEventListener('click',function(){var b=document.getElementById('manualBarcodeInput').value.trim();if(!b)return;scannerActive=false;lookupBarcode(b);});
document.getElementById('manualBarcodeInput').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('manualLookupBtn').click();});
render();
</script>
</body>
</html>
