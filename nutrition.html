<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dave · Nutrition</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#07090d;--s1:#0d1117;--s2:#131920;--s3:#1a2233;--border:#1e2a3a;--border2:#253248;--accent:#00e5ff;--adim:rgba(0,229,255,0.1);--green:#00ff88;--gdim:rgba(0,255,136,0.1);--orange:#ff6b35;--odim:rgba(255,107,53,0.1);--yellow:#ffd600;--ydim:rgba(255,214,0,0.1);--red:#ff3d71;--rdim:rgba(255,61,113,0.1);--purple:#b388ff;--text:#e2e8f5;--muted:#4a5c78;--muted2:#2e3d54}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;padding-bottom:90px}
.nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(7,9,13,0.95);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:10px 0 max(10px,env(safe-area-inset-bottom))}
.nav-link{display:flex;flex-direction:column;align-items:center;gap:4px;text-decoration:none;color:var(--muted);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;padding:6px 20px;border-radius:10px;transition:color 0.2s}
.nav-link svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.nav-link.active,.nav-link:hover{color:var(--accent)}
.wrap{max-width:600px;margin:0 auto;padding:20px 16px}
.page-header{padding:20px 0 20px;display:flex;justify-content:space-between;align-items:center}
.page-header h1{font-family:'Bebas Neue',sans-serif;font-size:38px;letter-spacing:2px}
.date-nav{display:flex;align-items:center;gap:8px;background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:7px 12px}
.date-nav button{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;transition:color 0.2s;padding:0 2px}
.date-nav button:hover{color:var(--accent)}
.dlabel{font-family:'DM Mono',monospace;font-size:11px;color:var(--text);min-width:60px;text-align:center}
.snap{background:var(--s1);border:1px solid var(--border);border-radius:18px;padding:20px;margin-bottom:14px;position:relative;overflow:hidden}
.snap::before{content:'';position:absolute;top:-50px;right:-50px;width:180px;height:180px;background:radial-gradient(circle,rgba(0,229,255,0.05),transparent 70%);pointer-events:none}
.snap-top{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:14px}
.snap-cal{font-family:'Bebas Neue',sans-serif;font-size:64px;color:var(--accent);line-height:1;letter-spacing:2px}
.snap-right{text-align:right}
.snap-rem{font-family:'Bebas Neue',sans-serif;font-size:30px;color:var(--green);line-height:1}
.snap-rem.over{color:var(--red)}
.snap-remlabel{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase}
.bar-track{height:8px;background:var(--border);border-radius:99px;overflow:hidden;margin-bottom:14px}
.bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--green));transition:width 0.7s ease;max-width:100%}
.bar-fill.over{background:linear-gradient(90deg,var(--orange),var(--red))}
.macro-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.mpill{background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:10px 12px}
.mpill .mp-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.mpill .mpl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
.mpill .mpv{font-family:'Bebas Neue',sans-serif;font-size:20px;line-height:1}
.mpill .mpv.p{color:var(--green)} .mpill .mpv.c{color:#7eb8ff} .mpill .mpv.f{color:var(--orange)}
.mpill .mpbar{height:3px;background:var(--border);border-radius:99px;overflow:hidden}
.mpill .mpbf{height:100%;border-radius:99px;max-width:100%;transition:width 0.6s ease}
.mpill .mpbf.p{background:var(--green)} .mpill .mpbf.c{background:#7eb8ff} .mpill .mpbf.f{background:var(--orange)}
.mpill .mpsub{font-size:9px;color:var(--muted);margin-top:3px}
.log-card{background:var(--s1);border:1px solid var(--border);border-radius:18px;padding:18px;margin-bottom:14px}
.card-title{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--accent);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.card-title::after{content:'';flex:1;height:1px;background:var(--border)}
.food-input{width:100%;background:var(--s2);border:1px solid var(--border2);border-radius:10px;padding:11px 13px;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;resize:none;min-height:64px;outline:none;transition:border-color 0.2s;margin-bottom:8px}
.food-input:focus{border-color:var(--accent)}
.food-input::placeholder{color:var(--muted)}
.meal-select{width:100%;background:var(--s2);border:1px solid var(--border2);border-radius:10px;padding:9px 13px;color:var(--text);font-family:'Syne',sans-serif;font-size:13px;outline:none;cursor:pointer;margin-bottom:8px}
.meal-select option{background:var(--s2)}
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.scan-btn{background:var(--s2);border:1px solid var(--border2);border-radius:10px;padding:10px;color:var(--accent);font-family:'Syne',sans-serif;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;letter-spacing:1px;transition:all 0.2s}
.scan-btn:hover{background:var(--adim);border-color:var(--accent)}
.log-btn{background:var(--accent);color:var(--bg);border:none;border-radius:10px;padding:10px;font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:2px;cursor:pointer;transition:opacity 0.2s}
.log-btn:disabled{opacity:0.4;cursor:not-allowed}
.log-btn:hover:not(:disabled){opacity:0.88}
.log-status{font-size:11px;color:var(--muted);text-align:center;min-height:16px}
.log-status.loading{color:var(--accent)} .log-status.success{color:var(--green)} .log-status.error{color:var(--red)}
.meal-bd{background:var(--s1);border:1px solid var(--border);border-radius:18px;padding:18px;margin-bottom:14px}
.meal-slots{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.mslot{background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:12px 10px}
.mslot .msn{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:2px}
.mslot .mst{font-size:9px;color:var(--muted2);margin-bottom:6px}
.mslot .msc{font-family:'Bebas Neue',sans-serif;font-size:24px;line-height:1;color:var(--text)}
.mslot .mstgt{font-size:9px;color:var(--muted)}
.mslot .msbar{height:3px;background:var(--border);border-radius:99px;margin-top:6px;overflow:hidden}
.mslot .msbf{height:100%;border-radius:99px;background:var(--accent);max-width:100%;transition:width 0.5s ease}
.entries-card{background:var(--s1);border:1px solid var(--border);border-radius:18px;padding:18px;margin-bottom:14px}
.entries-list{display:flex;flex-direction:column;gap:6px;max-height:320px;overflow-y:auto;padding-right:2px}
.entries-list::-webkit-scrollbar{width:2px} .entries-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}
.entry{display:flex;align-items:center;justify-content:space-between;background:var(--s2);border-radius:9px;padding:9px 11px;gap:8px;animation:slideIn 0.25s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
.entry-left{flex:1;min-width:0}
.entry-name{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.entry-tag{font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:1px}
.entry-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.entry-cal{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--accent);line-height:1}
.entry-pfc{font-size:9px;text-align:right;line-height:1.6}
.entry-del{background:none;border:none;color:var(--muted2);cursor:pointer;font-size:13px;padding:4px;border-radius:6px;transition:all 0.2s}
.entry-del:hover{color:var(--red);background:var(--rdim)}
.empty-state{text-align:center;padding:28px;color:var(--muted);font-size:13px;line-height:2}
.scanner-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:200;align-items:center;justify-content:center;padding:16px}
.scanner-overlay.active{display:flex}
.scanner-modal{background:var(--s1);border:1px solid var(--border2);border-radius:20px;padding:22px;width:100%;max-width:420px}
.smod-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.smod-hdr h3{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--accent)}
.smod-close{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:4px 8px;border-radius:8px;transition:all 0.2s}
.smod-close:hover{color:var(--red);background:var(--rdim)}
.video-wrap{position:relative;width:100%;aspect-ratio:4/3;background:#000;border-radius:12px;overflow:hidden;margin-bottom:12px}
#scannerVideo{width:100%;height:100%;object-fit:cover;display:block}
.scan-line{position:absolute;left:10%;right:10%;height:2px;background:var(--accent);box-shadow:0 0 8px var(--accent);animation:scanMove 2s ease-in-out infinite;top:20%}
@keyframes scanMove{0%,100%{top:20%}50%{top:76%}}
.scan-corners{position:absolute;inset:10px;pointer-events:none}
.scan-corners::before,.scan-corners::after,.scan-corners span::before,.scan-corners span::after{content:'';position:absolute;width:18px;height:18px;border-color:var(--accent);border-style:solid}
.scan-corners::before{top:0;left:0;border-width:2px 0 0 2px} .scan-corners::after{top:0;right:0;border-width:2px 2px 0 0}
.scan-corners span::before{bottom:0;left:0;border-width:0 0 2px 2px} .scan-corners span::after{bottom:0;right:0;border-width:0 2px 2px 0}
.scanner-status{text-align:center;font-size:11px;color:var(--muted);margin-bottom:10px;min-height:16px;letter-spacing:1px}
.scanner-status.scanning{color:var(--accent)} .scanner-status.found{color:var(--green)} .scanner-status.error{color:var(--red)}
.product-confirm{display:none;background:var(--s2);border:1px solid var(--border2);border-radius:12px;padding:14px;margin-bottom:10px}
.product-confirm.show{display:block}
.pc-name{font-size:13px;font-weight:700;margin-bottom:2px} .pc-brand{font-size:10px;color:var(--muted);margin-bottom:10px}
.pc-macros{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px}
.pcm{background:var(--s1);border-radius:8px;padding:7px 5px;text-align:center}
.pcm .pcmv{font-family:'Bebas Neue',sans-serif;font-size:18px;line-height:1}
.pcm .pcmv.cal{color:var(--accent)} .pcm .pcmv.p{color:var(--green)} .pcm .pcmv.c{color:#7eb8ff} .pcm .pcmv.f{color:var(--orange)}
.pcm .pcml{font-size:8px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:2px}
.serving-row{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted);margin-bottom:10px}
.serving-input{background:var(--s1);border:1px solid var(--border2);border-radius:8px;padding:6px 8px;color:var(--text);font-family:'Syne',sans-serif;font-size:13px;width:65px;text-align:center;outline:none}
.serving-input:focus{border-color:var(--accent)}
.pc-add-btn{background:var(--green);color:var(--bg);border:none;border-radius:10px;padding:10px;width:100%;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;cursor:pointer;transition:opacity 0.2s}
.pc-add-btn:hover{opacity:0.85}
.manual-wrap{display:flex;gap:8px;margin-top:8px}
.manual-input{flex:1;background:var(--s2);border:1px solid var(--border2);border-radius:8px;padding:8px 10px;color:var(--text);font-family:'Syne',sans-serif;font-size:12px;outline:none}
.manual-input:focus{border-color:var(--accent)}
.manual-input::placeholder{color:var(--muted)}
.manual-btn{background:var(--s2);border:1px solid var(--border2);border-radius:8px;padding:8px 12px;color:var(--accent);font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;transition:background 0.2s}
.manual-btn:hover{background:var(--adim)}
</style>
</head>
<body>
<div class="wrap">
  <div class="page-header">
    <h1>NUTRITION</h1>
    <div class="date-nav">
      <button id="prevDay">◂</button>
      <div class="dlabel" id="dateLabel">Today</div>
      <button id="nextDay">▸</button>
    </div>
  </div>
  <div class="snap">
    <div class="snap-top">
      <div><div class="snap-cal" id="snapCal">0</div><div style="font-size:10px;color:var(--muted);letter-spacing:3px;text-transform:uppercase">CALORIES</div></div>
      <div class="snap-right"><div class="snap-rem" id="snapRem">2400</div><div class="snap-remlabel" id="snapRemLabel">REMAINING</div></div>
    </div>
    <div class="bar-track"><div class="bar-fill" id="calBarFill" style="width:0%"></div></div>
    <div class="macro-row">
      <div class="mpill"><div class="mp-top"><span class="mpl">Protein</span><span class="mpv p" id="mpP">0g</span></div><div class="mpbar"><div class="mpbf p" id="mpPb" style="width:0%"></div></div><div class="mpsub" id="mpPs">0/185g</div></div>
      <div class="mpill"><div class="mp-top"><span class="mpl">Carbs</span><span class="mpv c" id="mpC">0g</span></div><div class="mpbar"><div class="mpbf c" id="mpCb" style="width:0%"></div></div><div class="mpsub" id="mpCs">0/220g</div></div>
      <div class="mpill"><div class="mp-top"><span class="mpl">Fat</span><span class="mpv f" id="mpF">0g</span></div><div class="mpbar"><div class="mpbf f" id="mpFb" style="width:0%"></div></div><div class="mpsub" id="mpFs">0/65g</div></div>
    </div>
  </div>
  <div class="log-card">
    <div class="card-title">Log Food</div>
    <textarea class="food-input" id="foodInput" placeholder="e.g. 200g chicken breast, 1 cup brown rice, 2 scrambled eggs…"></textarea>
    <select class="meal-select" id="mealSelect">
      <option value="Breakfast">Breakfast — 7:00 AM</option>
      <option value="Mid-Morning">Mid-Morning — 10:00 AM</option>
      <option value="Lunch">Lunch — 1:00 PM</option>
      <option value="Pre-Workout">Pre-Workout — 4:30 PM</option>
      <option value="Dinner">Dinner — 7:00 PM</option>
      <option value="Evening">Evening — 9:00 PM</option>
      <option value="Other">Other</option>
    </select>
    <div class="btn-row">
      <button class="scan-btn" id="openScannerBtn">▦ SCAN BARCODE</button>
      <button class="log-btn" id="logBtn">ANALYSE + LOG</button>
    </div>
    <div class="log-status" id="logStatus"></div>
  </div>
  <div class="meal-bd">
    <div class="card-title">Meal Breakdown</div>
    <div class="meal-slots" id="mealSlots"></div>
  </div>
  <div class="entries-card">
    <div class="card-title">Today's Log</div>
    <div class="entries-list" id="entriesList"></div>
  </div>
</div>
<div class="scanner-overlay" id="scannerOverlay">
  <div class="scanner-modal">
    <div class="smod-hdr"><h3>⬛ SCAN BARCODE</h3><button class="smod-close" id="closeScannerBtn">✕</button></div>
    <div class="video-wrap"><video id="scannerVideo" autoplay muted playsinline></video><div class="scan-line"></div><div class="scan-corners"><span></span></div></div>
    <div class="scanner-status" id="scannerStatus">Point camera at a barcode</div>
    <div class="product-confirm" id="productConfirm">
      <div class="pc-name" id="pcName"></div>
      <div class="pc-brand" id="pcBrand"></div>
      <div class="pc-macros">
        <div class="pcm"><div class="pcmv cal" id="pcCal">0</div><div class="pcml">Cal</div></div>
        <div class="pcm"><div class="pcmv p" id="pcP">0</div><div class="pcml">Prot</div></div>
        <div class="pcm"><div class="pcmv c" id="pcC">0</div><div class="pcml">Carbs</div></div>
        <div class="pcm"><div class="pcmv f" id="pcF">0</div><div class="pcml">Fat</div></div>
      </div>
      <div class="serving-row"><span>Serving:</span><input class="serving-input" id="servingInput" type="number" value="100" min="1"><span>g (per 100g)</span></div>
      <button class="pc-add-btn" id="pcAddBtn">ADD TO LOG</button>
    </div>
    <div class="manual-wrap">
      <input class="manual-input" id="manualBarcodeInput" type="number" placeholder="Enter barcode manually…">
      <button class="manual-btn" id="manualLookupBtn">LOOK UP</button>
    </div>
  </div>
</div>

<script>
const DB={get(k){try{return JSON.parse(localStorage.getItem('dw_'+k)||'null')}catch{return null}},set(k,v){localStorage.setItem('dw_'+k,JSON.stringify(v))},dayKey(off=0){const d=new Date();d.setDate(d.getDate()+off);return d.toISOString().split('T')[0]}};
const TARGETS={cal:2400,p:185,c:220,f:65};
const MEAL_TARGETS={'Breakfast':480,'Mid-Morning':280,'Lunch':560,'Pre-Workout':320,'Dinner':580,'Evening':180,'Other':0};
const MEAL_TIMES={'Breakfast':'7:00 AM','Mid-Morning':'10:00 AM','Lunch':'1:00 PM','Pre-Workout':'4:30 PM','Dinner':'7:00 PM','Evening':'9:00 PM','Other':'—'};
let offset=0;
function dayKey(){return DB.dayKey(offset)}
function getNutrition(){return DB.get('nutrition_'+dayKey())||{entries:[]}}
function saveNutrition(d){DB.set('nutrition_'+dayKey(),d)}
function dateLabel(off){if(off===0)return'Today';if(off===-1)return'Yesterday';const d=new Date();d.setDate(d.getDate()+off);return d.toLocaleDateString('en-AU',{day:'numeric',month:'short'});}
function render(){
  document.getElementById('dateLabel').textContent=dateLabel(offset);
  const data=getNutrition();
  const t=data.entries.reduce((a,e)=>({cal:a.cal+(e.cal||0),p:a.p+(e.p||0),c:a.c+(e.c||0),f:a.f+(e.f||0)}),{cal:0,p:0,c:0,f:0});
  document.getElementById('snapCal').textContent=Math.round(t.cal);
  const rem=TARGETS.cal-Math.round(t.cal);
  const remEl=document.getElementById('snapRem');
  remEl.textContent=Math.abs(rem);remEl.className='snap-rem'+(rem<0?' over':'');
  document.getElementById('snapRemLabel').textContent=rem<0?'OVER TARGET':'REMAINING';
  const barFill=document.getElementById('calBarFill');
  barFill.style.width=Math.min(t.cal/TARGETS.cal*100,100)+'%';
  barFill.className='bar-fill'+(t.cal>TARGETS.cal?' over':'');
  ['p','c','f'].forEach(k=>{const v=Math.round(t[k]),tgt=TARGETS[k];document.getElementById('mp'+k.toUpperCase()).textContent=v+'g';document.getElementById('mp'+k.toUpperCase()+'b').style.width=Math.min(v/tgt*100,100)+'%';document.getElementById('mp'+k.toUpperCase()+'s').textContent=v+'/'+tgt+'g';});
  const ms=document.getElementById('mealSlots');ms.innerHTML='';
  ['Breakfast','Mid-Morning','Lunch','Pre-Workout','Dinner','Evening'].forEach(meal=>{const mc=data.entries.filter(e=>e.meal===meal).reduce((s,e)=>s+(e.cal||0),0);const tgt=MEAL_TARGETS[meal],pct=tgt>0?Math.min(mc/tgt*100,100):0;const s=document.createElement('div');s.className='mslot';s.innerHTML=`<div class="msn">${meal}</div><div class="mst">${MEAL_TIMES[meal]}</div><div class="msc">${Math.round(mc)}</div><div class="mstgt">tgt: ${tgt}</div><div class="msbar"><div class="msbf" style="width:${pct}%"></div></div>`;ms.appendChild(s);});
  const el=document.getElementById('entriesList');
  if(data.entries.length===0){el.innerHTML='<div class="empty-state">Nothing logged yet.<br>Add your first meal above ↑</div>';return;}
  el.innerHTML='';
  [...data.entries].reverse().forEach((e,ri)=>{const idx=data.entries.length-1-ri;const item=document.createElement('div');item.className='entry';item.innerHTML=`<div class="entry-left"><div class="entry-name">${e.name}</div><div class="entry-tag">${e.meal}</div></div><div class="entry-right"><div><div class="entry-cal">${Math.round(e.cal)}</div><div style="font-size:8px;color:var(--muted)">kcal</div></div><div class="entry-pfc"><span style="color:var(--green)">${Math.round(e.p)}P</span><br><span style="color:#7eb8ff">${Math.round(e.c)}C</span><br><span style="color:var(--orange)">${Math.round(e.f)}F</span></div><button class="entry-del" data-idx="${idx}">✕</button></div>`;el.appendChild(item);});
  el.querySelectorAll('.entry-del').forEach(btn=>{btn.addEventListener('click',()=>{const d=getNutrition();d.entries.splice(parseInt(btn.dataset.idx),1);saveNutrition(d);render();});});
}
async function analyseFood(text){
  const prompt=`You are a nutrition expert. Analyse this food and return ONLY JSON (no markdown):\nFood: "${text}"\n{"name":"short name max 40 chars","cal":number,"p":number,"c":number,"f":number}\nMacros in grams, calories as kcal. Sum multiple items. Australian foods.`;
  const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:300,messages:[{role:'user',content:prompt}]})});
  const d=await res.json();
  return JSON.parse((d.content?.[0]?.text||'').replace(/```json|```/g,'').trim());
}
document.getElementById('logBtn').addEventListener('click',async()=>{
  const input=document.getElementById('foodInput');const text=input.value.trim();if(!text)return;
  const btn=document.getElementById('logBtn'),status=document.getElementById('logStatus'),meal=document.getElementById('mealSelect').value;
  btn.disabled=true;status.textContent='⏳ Analysing…';status.className='log-status loading';
  try{const r=await analyseFood(text);r.meal=meal;r.time=new Date().toISOString();const d=getNutrition();d.entries.push(r);saveNutrition(d);input.value='';status.textContent=`✓ ${r.name} — ${Math.round(r.cal)} cal · ${Math.round(r.p)}P · ${Math.round(r.c)}C · ${Math.round(r.f)}F`;status.className='log-status success';render();setTimeout(()=>{status.textContent='';status.className='log-status';},4000);}
  catch(e){status.textContent='✗ Could not analyse. Try again.';status.className='log-status error';setTimeout(()=>{status.textContent='';status.className='log-status';},3000);}
  btn.disabled=false;
});
document.getElementById('prevDay').addEventListener('click',()=>{offset--;render();});
document.getElementById('nextDay').addEventListener('click',()=>{if(offset<0){offset++;render();}});
let scannerStream=null,scannerActive=false,zxingReader=null,currentProduct=null;
function loadZXing(){return new Promise((res,rej)=>{if(window.ZXing){res();return;}const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/zxing-js/0.20.0/zxing.min.js';s.onload=res;s.onerror=rej;document.head.appendChild(s);});}
async function openScanner(){
  document.getElementById('scannerOverlay').classList.add('active');document.getElementById('productConfirm').classList.remove('show');document.getElementById('scannerStatus').textContent='Starting camera…';document.getElementById('scannerStatus').className='scanner-status scanning';currentProduct=null;
  try{await loadZXing();const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});scannerStream=stream;const video=document.getElementById('scannerVideo');video.srcObject=stream;await video.play();scannerActive=true;document.getElementById('scannerStatus').textContent='Point camera at a barcode';zxingReader=new ZXing.BrowserMultiFormatReader();zxingReader.decodeFromVideoElement(video,(result)=>{if(!scannerActive||!result)return;scannerActive=false;lookupBarcode(result.getText());});}
  catch(e){document.getElementById('scannerStatus').textContent=e.name==='NotAllowedError'?'Camera denied — use manual entry below':'Camera unavailable — use manual entry';document.getElementById('scannerStatus').className='scanner-status error';}
}
async function lookupBarcode(barcode){
  document.getElementById('scannerStatus').textContent=`Barcode: ${barcode} — looking up…`;document.getElementById('scannerStatus').className='scanner-status scanning';
  try{const res=await fetch(`https://world.openfoodfacts.org/api/v0/product/${barcode}.json`);const data=await res.json();if(data.status!==1||!data.product){document.getElementById('scannerStatus').textContent='✗ Not found in database';document.getElementById('scannerStatus').className='scanner-status error';scannerActive=true;return;}const p=data.product,n=p.nutriments||{};const per100={cal:Math.round(n['energy-kcal_100g']||n['energy_100g']/4.184||0),p:Math.round((n['proteins_100g']||0)*10)/10,c:Math.round((n['carbohydrates_100g']||0)*10)/10,f:Math.round((n['fat_100g']||0)*10)/10};currentProduct={name:p.product_name||'Unknown Product',brand:p.brands||'',per100,servingSize:parseFloat(p.serving_size)||100};document.getElementById('pcName').textContent=currentProduct.name;document.getElementById('pcBrand').textContent=currentProduct.brand?`by ${currentProduct.brand}`:'';document.getElementById('servingInput').value=Math.round(currentProduct.servingSize);updateProductMacros();document.getElementById('productConfirm').classList.add('show');document.getElementById('scannerStatus').textContent='✓ Found! Adjust serving if needed';document.getElementById('scannerStatus').className='scanner-status found';}
  catch(e){document.getElementById('scannerStatus').textContent='✗ Lookup failed';document.getElementById('scannerStatus').className='scanner-status error';scannerActive=true;}
}
function updateProductMacros(){if(!currentProduct)return;const s=parseFloat(document.getElementById('servingInput').value)||100,r=s/100,{per100}=currentProduct;document.getElementById('pcCal').textContent=Math.round(per100.cal*r);document.getElementById('pcP').textContent=Math.round(per100.p*r*10)/10;document.getElementById('pcC').textContent=Math.round(per100.c*r*10)/10;document.getElementById('pcF').textContent=Math.round(per100.f*r*10)/10;}
function closeScanner(){scannerActive=false;if(zxingReader){try{zxingReader.reset();}catch(e){}zxingReader=null;}if(scannerStream){scannerStream.getTracks().forEach(t=>t.stop());scannerStream=null;}document.getElementById('scannerVideo').srcObject=null;document.getElementById('scannerOverlay').classList.remove('active');document.getElementById('productConfirm').classList.remove('show');document.getElementById('manualBarcodeInput').value='';currentProduct=null;}
document.getElementById('openScannerBtn').addEventListener('click',openScanner);
document.getElementById('closeScannerBtn').addEventListener('click',closeScanner);
document.getElementById('servingInput').addEventListener('input',updateProductMacros);
document.getElementById('scannerOverlay').addEventListener('click',e=>{if(e.target===document.getElementById('scannerOverlay'))closeScanner();});
document.getElementById('pcAddBtn').addEventListener('click',()=>{if(!currentProduct)return;const s=parseFloat(document.getElementById('servingInput').value)||100,r=s/100,{per100,name}=currentProduct;const meal=document.getElementById('mealSelect').value;const entry={name:name.length>40?name.slice(0,38)+'…':name,cal:Math.round(per100.cal*r),p:Math.round(per100.p*r*10)/10,c:Math.round(per100.c*r*10)/10,f:Math.round(per100.f*r*10)/10,meal,time:new Date().toISOString(),source:'barcode'};const d=getNutrition();d.entries.push(entry);saveNutrition(d);render();closeScanner();const status=document.getElementById('logStatus');status.textContent=`✓ Scanned: ${entry.name} — ${entry.cal} cal`;status.className='log-status success';setTimeout(()=>{status.textContent='';status.className='log-status';},4000);});
document.getElementById('manualLookupBtn').addEventListener('click',()=>{const b=document.getElementById('manualBarcodeInput').value.trim();if(!b)return;scannerActive=false;lookupBarcode(b);});
document.getElementById('manualBarcodeInput').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('manualLookupBtn').click();});
render();
</script>
</body>
