<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dave - History</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#07090d;--s1:#0d1117;--s2:#131920;--s3:#1a2233;--border:#1e2a3a;--border2:#253248;--accent:#00e5ff;--adim:rgba(0,229,255,0.1);--green:#00ff88;--orange:#ff6b35;--yellow:#ffd600;--red:#ff3d71;--purple:#b388ff;--blue:#4fc3f7;--text:#e2e8f5;--muted:#4a5c78;--muted2:#2e3d54}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;padding-bottom:90px}
.nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(7,9,13,0.95);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:10px 0 max(10px,env(safe-area-inset-bottom))}
.nav-link{display:flex;flex-direction:column;align-items:center;gap:4px;text-decoration:none;color:var(--muted);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;padding:6px 16px;border-radius:10px;transition:color 0.2s}
.nav-link svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.nav-link.active,.nav-link:hover{color:var(--accent)}
.wrap{max-width:600px;margin:0 auto;padding:20px 16px}
.page-header{padding:16px 0 20px;display:flex;align-items:center;gap:12px}
.back-btn{background:var(--s1);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:20px;cursor:pointer;width:40px;height:40px;display:flex;align-items:center;justify-content:center;text-decoration:none;transition:border-color 0.2s}
.back-btn:hover{border-color:var(--accent)}
.page-header h1{font-family:'Bebas Neue',sans-serif;font-size:34px;letter-spacing:2px;line-height:1}
.page-header .sub{font-size:10px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-top:2px}

/* Tab switcher */
.tabs{display:flex;gap:6px;background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:4px;margin-bottom:16px}
.tab{flex:1;background:none;border:none;color:var(--muted);font-family:'Syne',sans-serif;font-size:12px;font-weight:600;letter-spacing:2px;text-transform:uppercase;padding:10px;border-radius:8px;cursor:pointer;transition:all 0.2s}
.tab.active{background:var(--s3);color:var(--accent)}

/* Averages card */
.avg-card{background:var(--s1);border:1px solid var(--border);border-radius:18px;padding:20px;margin-bottom:16px;position:relative;overflow:hidden}
.avg-card::before{content:'';position:absolute;top:-50px;right:-50px;width:180px;height:180px;background:radial-gradient(circle,rgba(0,229,255,0.05),transparent 70%);pointer-events:none}
.avg-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:14px}
.avg-item .al{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.avg-item .av{font-family:'Bebas Neue',sans-serif;font-size:38px;line-height:1;color:var(--accent)}
.avg-item .au{font-size:12px;color:var(--muted);margin-left:4px}
.avg-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding-top:14px;border-top:1px solid var(--border)}
.mini{text-align:center}
.mini .mv{font-family:'Bebas Neue',sans-serif;font-size:22px;line-height:1}
.mini .ml{font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:2px}

/* Chart */
.chart-card{background:var(--s1);border:1px solid var(--border);border-radius:18px;padding:20px;margin-bottom:16px}
.card-title{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--accent);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.card-title::after{content:'';flex:1;height:1px;background:var(--border)}
.chart-wrap{position:relative;width:100%;height:160px}
.chart-wrap svg{width:100%;height:100%;overflow:visible}

/* Day list */
.day-list{display:flex;flex-direction:column;gap:4px;max-height:500px;overflow-y:auto}
.day-list::-webkit-scrollbar{width:2px}
.day-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}
.day-row{display:flex;align-items:center;justify-content:space-between;background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:10px 14px}
.day-row.today{border-color:var(--accent)}
.day-row.empty{opacity:0.5}
.day-left{display:flex;flex-direction:column}
.day-date{font-size:13px;font-weight:600;color:var(--text)}
.day-dow{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.day-right{display:flex;align-items:center;gap:10px}
.day-val{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--accent);line-height:1}
.day-unit{font-size:10px;color:var(--muted);letter-spacing:1px}
.day-bar-wrap{width:60px;height:4px;background:var(--border);border-radius:99px;overflow:hidden}
.day-bar-fill{height:100%;background:var(--accent);border-radius:99px}
.empty-state{text-align:center;padding:28px;color:var(--muted);font-size:13px;line-height:2}

/* Metric color variants */
.m-cal .av,.m-cal .day-val,.m-cal .tab.active,.m-cal .back-btn:hover{color:var(--accent)}
.m-cal .day-bar-fill{background:var(--accent)}
.m-pro .av,.m-pro .day-val{color:var(--green)}
.m-pro .day-bar-fill{background:var(--green)}
.m-pro .tab.active{color:var(--green)}
.m-steps .av,.m-steps .day-val{color:var(--yellow)}
.m-steps .day-bar-fill{background:var(--yellow)}
.m-steps .tab.active{color:var(--yellow)}
.m-water .av,.m-water .day-val{color:var(--blue)}
.m-water .day-bar-fill{background:var(--blue)}
.m-water .tab.active{color:var(--blue)}
.m-workout .av,.m-workout .day-val{color:var(--purple)}
.m-workout .day-bar-fill{background:var(--purple)}
.m-workout .tab.active{color:var(--purple)}
.m-weight .av,.m-weight .day-val{color:var(--orange)}
.m-weight .day-bar-fill{background:var(--orange)}
.m-weight .tab.active{color:var(--orange)}
</style>
</head>
<body>
<div class="wrap" id="pageWrap">
  <div class="page-header">
    <a href="index.html" class="back-btn">&#10094;</a>
    <div>
      <div class="sub">History</div>
      <h1 id="metricTitle">METRIC</h1>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" data-period="7">7 DAYS</button>
    <button class="tab" data-period="30">30 DAYS</button>
  </div>

  <div class="avg-card">
    <div class="avg-row">
      <div class="avg-item">
        <div class="al">Average</div>
        <div><span class="av" id="avgVal">0</span><span class="au" id="avgUnit"></span></div>
      </div>
      <div class="avg-item">
        <div class="al">Total</div>
        <div><span class="av" id="totalVal" style="color:var(--text)">0</span><span class="au" id="totalUnit"></span></div>
      </div>
    </div>
    <div class="avg-stats">
      <div class="mini"><div class="mv" id="bestVal" style="color:var(--green)">0</div><div class="ml">Best Day</div></div>
      <div class="mini"><div class="mv" id="lowVal" style="color:var(--red)">0</div><div class="ml">Lowest</div></div>
      <div class="mini"><div class="mv" id="loggedVal" style="color:var(--text)">0/0</div><div class="ml">Days Logged</div></div>
    </div>
  </div>

  <div class="chart-card">
    <div class="card-title">Trend</div>
    <div class="chart-wrap">
      <svg id="chart" preserveAspectRatio="none" viewBox="0 0 300 160"></svg>
    </div>
  </div>

  <div class="chart-card">
    <div class="card-title">Daily Breakdown</div>
    <div class="day-list" id="dayList"></div>
  </div>
</div>

<nav class="nav">
  <a class="nav-link active" href="index.html"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Hub</a>
  <a class="nav-link" href="nutrition.html"><svg viewBox="0 0 24 24"><path d="M12 2a7 7 0 0 1 7 7c0 5-7 13-7 13S5 14 5 9a7 7 0 0 1 7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>Nutrition</a>
  <a class="nav-link" href="workout.html"><svg viewBox="0 0 24 24"><path d="M6 4v16M18 4v16M3 8h3M18 8h3M3 16h3M18 16h3M6 12h12"/></svg>Workout</a>
  <a class="nav-link" href="weight.html"><svg viewBox="0 0 24 24"><path d="M3 6h18M3 12h18M3 18h18"/></svg>Weight</a>
</nav>

<script src="db.js"></script>
<script>
// Metric configuration drives everything — title, unit, how to read the value
// for a given day, color variant on the page.
var METRICS = {
  calories: {title:'CALORIES', unit:'kcal', color:'m-cal', accent:'var(--accent)',
    read:function(key){ var n=DB.get('nutrition_'+key); return n ? n.entries.reduce(function(s,e){return s+(e.cal||0);},0) : 0; }},
  protein: {title:'PROTEIN', unit:'g', color:'m-pro', accent:'var(--green)',
    read:function(key){ var n=DB.get('nutrition_'+key); return n ? n.entries.reduce(function(s,e){return s+(e.p||0);},0) : 0; }},
  steps: {title:'STEPS', unit:'', color:'m-steps', accent:'var(--yellow)',
    read:function(key){ return DB.get('steps_'+key) || 0; }},
  water: {title:'WATER', unit:'ml', color:'m-water', accent:'var(--blue)',
    read:function(key){ return DB.get('water_'+key) || 0; }},
  workout: {title:'WORKOUT', unit:'min', color:'m-workout', accent:'var(--purple)',
    // Workout value = total session duration for the day (minutes)
    read:function(key){
      var w = DB.get('workouts_'+key) || [];
      return w.reduce(function(s,wk){ return s + (wk.duration || wk.minutes || 0); }, 0);
    }},
  weight: {title:'WEIGHT', unit:'kg', color:'m-weight', accent:'var(--orange)',
    // Weights are stored as one array with date stamps, not per-day keys
    read:function(key){
      var all = DB.get('weights') || [];
      var match = all.filter(function(w){ return w.date === key; });
      return match.length ? match[match.length-1].kg : 0;
    }}
};

function getMetricParam(){
  var m = new URLSearchParams(window.location.search).get('metric');
  return METRICS[m] ? m : 'steps';
}

var currentMetric = getMetricParam();
var currentPeriod = 7;

function fmt(n, metric){
  if (metric === 'weight') return n ? n.toFixed(1) : '--';
  if (n >= 10000) return Math.round(n).toLocaleString();
  if (n >= 100) return Math.round(n).toString();
  return Math.round(n).toString();
}

function dowShort(d){
  return ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()];
}

function dateLabel(d, todayKey){
  var k = DB.dateToKey(d);
  if (k === todayKey) return 'Today';
  var y = new Date(); y.setDate(y.getDate()-1);
  if (k === DB.dateToKey(y)) return 'Yesterday';
  return d.getDate() + ' ' + ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()];
}

// Pull N days of data, most-recent first. Returns array of {key, date, value}.
function gatherData(days){
  var today = new Date();
  var out = [];
  var m = METRICS[currentMetric];
  for (var i = 0; i < days; i++) {
    var d = new Date();
    d.setDate(today.getDate() - i);
    var key = DB.dateToKey(d);
    out.push({ key: key, date: d, value: m.read(key) });
  }
  return out; // index 0 = today, index days-1 = oldest
}

function renderChart(data){
  var svg = document.getElementById('chart');
  svg.innerHTML = '';
  var m = METRICS[currentMetric];
  // Reverse so chart reads left-to-right oldest → newest
  var series = data.slice().reverse();
  var values = series.map(function(d){ return d.value; });
  var max = Math.max.apply(null, values);
  var min = Math.min.apply(null, values.filter(function(v){ return v > 0; }));
  if (!isFinite(min)) min = 0;
  if (max === 0) max = 1; // avoid divide-by-zero

  var W = 300, H = 160, PAD_L = 8, PAD_R = 8, PAD_T = 12, PAD_B = 22;
  var plotW = W - PAD_L - PAD_R;
  var plotH = H - PAD_T - PAD_B;

  // For weight, Y-axis starts near min to show variation. For others, start at 0.
  var yMin = (currentMetric === 'weight' && min > 0) ? min - 1 : 0;
  var yMax = max * 1.1;
  if (yMax === yMin) yMax = yMin + 1;

  function x(i){ return PAD_L + (series.length === 1 ? plotW/2 : (i / (series.length - 1)) * plotW); }
  function y(v){ return PAD_T + plotH - ((v - yMin) / (yMax - yMin)) * plotH; }

  // Gridlines (3 horizontal)
  for (var g = 0; g <= 2; g++) {
    var gy = PAD_T + (plotH * g / 2);
    var line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', PAD_L); line.setAttribute('x2', W - PAD_R);
    line.setAttribute('y1', gy); line.setAttribute('y2', gy);
    line.setAttribute('stroke', 'var(--border)'); line.setAttribute('stroke-width', '1');
    svg.appendChild(line);
  }

  // Build path
  var hasData = values.some(function(v){ return v > 0; });
  if (hasData) {
    var pts = series.map(function(d, i){ return x(i) + ',' + y(d.value); });
    // Fill area under line
    var areaPath = 'M ' + PAD_L + ',' + (PAD_T + plotH) + ' L ' + pts.join(' L ') + ' L ' + (W - PAD_R) + ',' + (PAD_T + plotH) + ' Z';
    var area = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    area.setAttribute('d', areaPath);
    area.setAttribute('fill', m.accent);
    area.setAttribute('fill-opacity', '0.12');
    svg.appendChild(area);

    // Line
    var line = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    line.setAttribute('d', 'M ' + pts.join(' L '));
    line.setAttribute('stroke', m.accent);
    line.setAttribute('stroke-width', '2');
    line.setAttribute('fill', 'none');
    line.setAttribute('stroke-linejoin', 'round');
    line.setAttribute('stroke-linecap', 'round');
    svg.appendChild(line);

    // Dots (only for 7-day view to avoid clutter)
    if (currentPeriod === 7) {
      series.forEach(function(d, i){
        if (d.value > 0) {
          var c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
          c.setAttribute('cx', x(i)); c.setAttribute('cy', y(d.value));
          c.setAttribute('r', '3'); c.setAttribute('fill', m.accent);
          svg.appendChild(c);
        }
      });
    }
  } else {
    var t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    t.setAttribute('x', W/2); t.setAttribute('y', H/2);
    t.setAttribute('text-anchor', 'middle');
    t.setAttribute('fill', 'var(--muted)');
    t.setAttribute('font-size', '12');
    t.setAttribute('font-family', 'Syne, sans-serif');
    t.textContent = 'No data yet';
    svg.appendChild(t);
  }

  // X-axis labels (first and last, plus middle for 30d)
  function xLabel(i, text){
    var t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    t.setAttribute('x', x(i)); t.setAttribute('y', H - 6);
    t.setAttribute('text-anchor', i === 0 ? 'start' : (i === series.length - 1 ? 'end' : 'middle'));
    t.setAttribute('fill', 'var(--muted)');
    t.setAttribute('font-size', '9');
    t.setAttribute('font-family', 'DM Mono, monospace');
    t.textContent = text;
    svg.appendChild(t);
  }
  if (series.length > 0) {
    xLabel(0, dowShort(series[0].date));
    xLabel(series.length - 1, 'Today');
    if (series.length >= 14) xLabel(Math.floor(series.length / 2), dowShort(series[Math.floor(series.length/2)].date));
  }
}

function render(){
  var m = METRICS[currentMetric];
  document.getElementById('metricTitle').textContent = m.title;
  document.getElementById('pageWrap').className = 'wrap ' + m.color;

  // Apply theme color to accent elements via style override
  var style = document.getElementById('dynStyle');
  if (!style) { style = document.createElement('style'); style.id = 'dynStyle'; document.head.appendChild(style); }
  style.textContent = '.m-' + currentMetric.replace('calories','cal').replace('protein','pro') +
    ' .av{color:' + m.accent + '}' +
    '.m-' + currentMetric.replace('calories','cal').replace('protein','pro') +
    ' .day-val{color:' + m.accent + '}' +
    '.m-' + currentMetric.replace('calories','cal').replace('protein','pro') +
    ' .day-bar-fill{background:' + m.accent + '}';

  var data = gatherData(currentPeriod);
  var values = data.map(function(d){ return d.value; });
  var nonZero = values.filter(function(v){ return v > 0; });
  var total = values.reduce(function(s,v){ return s+v; }, 0);

  // Averages — for weight, average over days with a reading only. For others, average over all days in period.
  var avg;
  if (currentMetric === 'weight') {
    avg = nonZero.length ? nonZero.reduce(function(s,v){ return s+v; }, 0) / nonZero.length : 0;
  } else {
    avg = total / currentPeriod;
  }

  document.getElementById('avgVal').textContent = fmt(avg, currentMetric);
  document.getElementById('avgUnit').textContent = ' ' + m.unit;

  // Total doesn't make sense for weight
  if (currentMetric === 'weight') {
    document.getElementById('totalVal').textContent = nonZero.length ? fmt(nonZero[0], currentMetric) : '--';
    document.getElementById('totalUnit').textContent = ' ' + m.unit;
    document.querySelector('#totalVal').previousElementSibling ?
      (document.querySelector('.avg-item:nth-child(2) .al').textContent = 'Latest') : null;
  } else {
    document.getElementById('totalVal').textContent = total >= 1000 ? Math.round(total).toLocaleString() : Math.round(total);
    document.getElementById('totalUnit').textContent = ' ' + m.unit;
    document.querySelector('.avg-item:nth-child(2) .al').textContent = 'Total';
  }

  // Best / lowest / logged
  var best = nonZero.length ? Math.max.apply(null, nonZero) : 0;
  var low = nonZero.length ? Math.min.apply(null, nonZero) : 0;
  document.getElementById('bestVal').textContent = fmt(best, currentMetric);
  document.getElementById('lowVal').textContent = fmt(low, currentMetric);
  document.getElementById('loggedVal').textContent = nonZero.length + '/' + currentPeriod;

  renderChart(data);

  // Day-by-day list
  var list = document.getElementById('dayList');
  list.innerHTML = '';
  var todayKey = DB.dayKey();
  var maxVal = best || 1;
  data.forEach(function(d){
    var row = document.createElement('div');
    row.className = 'day-row' + (d.key === todayKey ? ' today' : '') + (d.value === 0 ? ' empty' : '');
    var pct = Math.min(100, (d.value / maxVal) * 100);
    row.innerHTML =
      '<div class="day-left">' +
        '<div class="day-date">' + dateLabel(d.date, todayKey) + '</div>' +
        '<div class="day-dow">' + dowShort(d.date) + '</div>' +
      '</div>' +
      '<div class="day-right">' +
        '<div class="day-bar-wrap"><div class="day-bar-fill" style="width:' + pct + '%"></div></div>' +
        '<div><span class="day-val">' + (d.value > 0 ? fmt(d.value, currentMetric) : '--') + '</span>' +
        (d.value > 0 ? ' <span class="day-unit">' + m.unit + '</span>' : '') + '</div>' +
      '</div>';
    list.appendChild(row);
  });
}

// Tab switching
document.querySelectorAll('.tab').forEach(function(btn){
  btn.addEventListener('click', function(){
    document.querySelectorAll('.tab').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
    currentPeriod = parseInt(btn.dataset.period);
    render();
  });
});

render();
</script>
</body>
</html>
