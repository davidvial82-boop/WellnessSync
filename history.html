<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dave · Workout History</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#07090d;--s1:#0d1117;--s2:#131920;--s3:#1a2233;--border:#1e2a3a;--border2:#253248;--accent:#00e5ff;--adim:rgba(0,229,255,0.1);--green:#00ff88;--gdim:rgba(0,255,136,0.1);--orange:#ff6b35;--odim:rgba(255,107,53,0.1);--yellow:#ffd600;--ydim:rgba(255,214,0,0.1);--red:#ff3d71;--rdim:rgba(255,61,113,0.1);--purple:#b388ff;--pdim:rgba(179,136,255,0.1);--text:#e2e8f5;--muted:#4a5c78;--muted2:#2e3d54}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;padding-bottom:90px}
.nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(7,9,13,0.95);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:10px 0 max(10px,env(safe-area-inset-bottom))}
.nav-link{display:flex;flex-direction:column;align-items:center;gap:4px;text-decoration:none;color:var(--muted);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;padding:6px 14px;border-radius:10px;transition:color 0.2s}
.nav-link svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.nav-link.active,.nav-link:hover{color:var(--purple)}
.wrap{max-width:600px;margin:0 auto;padding:20px 16px}
.page-header{padding:20px 0 20px;display:flex;justify-content:space-between;align-items:center;gap:8px}
.page-header h1{font-family:'Bebas Neue',sans-serif;font-size:38px;letter-spacing:2px}
.back-link{display:inline-flex;align-items:center;gap:6px;background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:8px 12px;color:var(--purple);text-decoration:none;font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;transition:all 0.2s}
.back-link:hover{background:var(--pdim);border-color:var(--purple)}
.back-link svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.card-title{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--purple);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.card-title::after{content:'';flex:1;height:1px;background:var(--border)}

.summary-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.summary-tile{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:14px;text-align:center}
.summary-val{font-family:'Bebas Neue',sans-serif;font-size:32px;line-height:1;color:var(--purple);margin-bottom:4px}
.summary-lbl{font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase}

.filter-row{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding:2px 0}
.filter-row::-webkit-scrollbar{display:none}
.filter-chip{background:var(--s2);border:1px solid var(--border2);border-radius:99px;padding:7px 14px;color:var(--muted);font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;cursor:pointer;white-space:nowrap;transition:all 0.2s;text-transform:uppercase}
.filter-chip:hover{color:var(--text);border-color:var(--border2)}
.filter-chip.active{background:var(--pdim);border-color:var(--purple);color:var(--purple)}

.history-list{display:flex;flex-direction:column;gap:10px}
.history-item{background:var(--s1);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:border-color 0.2s}
.history-item.expanded{border-color:rgba(179,136,255,0.3)}
.hi-head{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:14px 16px;cursor:pointer}
.hi-left{flex:1;min-width:0}
.hi-date{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:3px;font-family:'DM Mono',monospace}
.hi-name{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--text);letter-spacing:1px;line-height:1.1;margin-bottom:3px}
.hi-name.strength{color:var(--purple)}
.hi-name.hiit{color:var(--red)}
.hi-name.cardio{color:var(--yellow)}
.hi-meta{font-size:11px;color:var(--muted);line-height:1.5}
.hi-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.hi-burn{font-family:'DM Mono',monospace;font-size:12px;color:var(--accent);text-align:right;min-width:60px}
.hi-chevron{color:var(--muted);transition:transform 0.2s;flex-shrink:0}
.history-item.expanded .hi-chevron{transform:rotate(180deg)}

.hi-body{display:none;padding:0 16px 14px;border-top:1px solid var(--border)}
.history-item.expanded .hi-body{display:block}
.hi-exercises{display:flex;flex-direction:column;gap:8px;margin-top:10px}
.hi-ex{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:10px 12px}
.hi-ex-name{font-size:13px;font-weight:700;color:var(--text);margin-bottom:4px}
.hi-ex-cat{font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.hi-sets{display:flex;flex-wrap:wrap;gap:6px}
.hi-set-pill{background:var(--s3);border:1px solid var(--border2);border-radius:6px;padding:4px 8px;font-family:'DM Mono',monospace;font-size:11px;color:var(--text)}
.hi-set-pill.done{border-color:rgba(0,255,136,0.3);color:var(--green)}
.hi-cardio-line{font-family:'DM Mono',monospace;font-size:12px;color:var(--yellow)}

.hi-footer{display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:10px;border-top:1px solid var(--border)}
.hi-started{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace}
.hi-delete{background:none;border:1px solid var(--border2);color:var(--muted);border-radius:8px;padding:6px 12px;font-family:'Syne',sans-serif;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all 0.2s}
.hi-delete:hover{color:var(--red);border-color:var(--red);background:var(--rdim)}

.empty-state{text-align:center;padding:50px 20px;color:var(--muted);font-size:13px;line-height:2;background:var(--s1);border:1px dashed var(--border2);border-radius:14px}
.empty-state .emoji{font-size:40px;margin-bottom:12px;display:block;opacity:0.5}
</style>
</head>
<body>
<div class="wrap">
<div class="page-header">
<h1>HISTORY</h1>
<a class="back-link" href="workout.html">
<svg viewBox="0 0 24 24"><path d="M15 6l-6 6 6 6"/></svg>
BACK
</a>
</div>

<div class="summary-strip">
<div class="summary-tile"><div class="summary-val" id="countWeek">0</div><div class="summary-lbl">Last 7 Days</div></div>
<div class="summary-tile"><div class="summary-val" id="countMonth">0</div><div class="summary-lbl">Last 30 Days</div></div>
<div class="summary-tile"><div class="summary-val" id="countTotal">0</div><div class="summary-lbl">All Time</div></div>
</div>

<div class="filter-row" id="filterRow">
<button class="filter-chip active" data-filter="all">All</button>
<button class="filter-chip" data-filter="strength">Strength</button>
<button class="filter-chip" data-filter="hiit">HIIT</button>
<button class="filter-chip" data-filter="cardio">Cardio</button>
</div>

<div class="history-list" id="historyList"></div>
</div>

<nav class="nav">
<a class="nav-link" href="index.html"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Hub</a>
<a class="nav-link" href="nutrition.html"><svg viewBox="0 0 24 24"><path d="M12 2a7 7 0 0 1 7 7c0 5-7 13-7 13S5 14 5 9a7 7 0 0 1 7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>Nutrition</a>
<a class="nav-link active" href="workout.html"><svg viewBox="0 0 24 24"><path d="M6 4v16M18 4v16M3 8h3M18 8h3M3 16h3M18 16h3M6 12h12"/></svg>Workout</a>
<a class="nav-link" href="weight.html"><svg viewBox="0 0 24 24"><path d="M3 6h18M3 12h18M3 18h18"/></svg>Weight</a>
</nav>

<script>
var DB={_cache:{},_base:"/.netlify/functions/data",dayKey:function(off){off=off||0;var d=new Date();d.setDate(d.getDate()+off);return d.toISOString().split("T")[0];},_ls:function(k,v){try{if(v===undefined)return JSON.parse(localStorage.getItem("dw_"+k)||"null");localStorage.setItem("dw_"+k,JSON.stringify(v));}catch(e){return null;}},get:function(k,cb){if(!cb)return this._ls(k);var self=this;var local=this._ls(k);fetch(this._base+"?key="+encodeURIComponent(k)).then(function(r){return r.json();}).then(function(d){var val=(d.value!==undefined&&d.value!==null)?d.value:local;self._ls(k,val);if(cb)cb(val);}).catch(function(){if(cb)cb(local);});},set:function(k,v,cb){this._ls(k,v);fetch(this._base,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({key:k,value:v})}).then(function(){if(cb)cb(true);}).catch(function(){if(cb)cb(false);});}};

// MET values for burn estimation — duplicated from workout.html. Fallback is 5.0.
const MET_LOOKUP={
  'Bench Press':5.0,'Incline Bench Press':5.0,'Decline Bench Press':5.0,'Dumbbell Fly':5.0,'Cable Crossover':5.0,'Incline Dumbbell Press':5.0,'Push-Ups':5.0,
  'Squat':6.0,'Romanian Deadlift':6.0,'Leg Press':5.0,'Leg Curl':4.5,'Leg Extension':4.5,'Walking Lunges':5.0,'Hip Thrust':5.0,'Calf Raises':4.0,'Jump Squats':8.0,'Jump Lunges':8.0,'Squat Jumps':8.0,
  'Deadlift':6.0,'Pull-Ups':6.0,'Chin-Ups':6.0,'Barbell Row':5.0,'Seated Cable Row':4.5,'Lat Pulldown':4.5,'Single Arm Row':4.5,
  'Overhead Press':5.0,'Lateral Raises':4.0,'Front Raises':4.0,'Face Pulls':4.0,'Arnold Press':5.0,
  'Tricep Pushdown':4.0,'Skull Crushers':4.5,'Dips':5.5,'Overhead Tricep Extension':4.0,
  'Barbell Curl':4.0,'Dumbbell Curl':4.0,'Hammer Curl':4.0,'Preacher Curl':4.0,
  'Plank':3.5,'Ab Rollout':4.5,'Cable Crunch':4.0,'Hanging Leg Raise':5.0,'Toes to Bar':6.0,'Plank Hold':3.5,'Med Ball Slams':7.0,
  'Treadmill Run':9.0,'Outdoor Run':9.8,'Outdoor Walk':3.8,'Rowing Machine':7.0,'Bike':7.5,'Assault Bike':8.5,'Jump Rope':11.0,'Box Jumps':8.0,'Burpees':8.5,'Double Unders':11.5,
  'Kettlebell Swings':8.0,'Battle Ropes':8.0,'Mountain Climbers':8.0,'High Knees':9.0,'Sprint Intervals':10.0,'Dumbbell Thrusters':8.0,'Barbell Thruster':8.0,'Sled Push':9.0,'Wall Balls':8.0,'Sandbag Carries':7.5,'Tire Flips':9.0,'Sledgehammer Slams':8.5
};

function getBodyWeightKg(){
  const weights=DB.get('weights')||[];
  if(weights.length>0)return parseFloat(weights[weights.length-1].kg)||80;
  return 80;
}

function classifyWorkout(w){
  const id=(w.templateId||'').toLowerCase();
  if(['hiit1','tabata','hiit3','metcon'].includes(id))return 'hiit';
  if(['cardio','outdoor_walk','outdoor_run'].includes(id))return 'cardio';
  const exs=w.exercises||[];
  if(exs.length&&exs.every(e=>e.cardio||(e.category||'').toLowerCase()==='cardio'))return 'cardio';
  if(exs.length&&exs.every(e=>(e.category||'').toLowerCase()==='hiit'))return 'hiit';
  return 'strength';
}

function estimateBurn(w,kg){
  const totalMins=parseFloat(w.duration)||0;
  if(totalMins<=0)return 0;
  const exs=w.exercises||[];
  const classification=classifyWorkout(w);

  if(classification==='hiit')return Math.round(8.0*kg*(totalMins/60));

  let trackedCardioSec=0, cardioBurn=0;
  exs.forEach(ex=>{
    if(ex.cardio&&ex.durationSec>0){
      const mins=ex.durationSec/60;
      const met=MET_LOOKUP[ex.name]||7.0;
      cardioBurn+=met*kg*(mins/60);
      trackedCardioSec+=ex.durationSec;
    }
  });
  const trackedCardioMins=trackedCardioSec/60;
  const remainingMins=Math.max(0,totalMins-trackedCardioMins);

  let strengthMets=exs.filter(ex=>!ex.cardio).map(ex=>MET_LOOKUP[ex.name]||5.0);
  let avgStrengthMet=strengthMets.length?strengthMets.reduce((a,b)=>a+b,0)/strengthMets.length:5.0;
  if(classification==='cardio'&&trackedCardioSec>0)avgStrengthMet=0;
  const strengthBurn=avgStrengthMet*kg*(remainingMins/60);

  return Math.round(cardioBurn+strengthBurn);
}

function computeVolume(w){
  let vol=0;
  (w.exercises||[]).forEach(ex=>{
    if(ex.cardio)return;
    (ex.sets||[]).forEach(s=>{if(s.done&&s.weight&&s.reps)vol+=parseFloat(s.weight)*parseInt(s.reps);});
  });
  return vol;
}

function computeCardioSummary(w){
  let totalSec=0,totalKm=0;
  (w.exercises||[]).forEach(ex=>{
    if(!ex.cardio)return;
    totalSec+=(ex.durationSec||0);
    const d=parseFloat(ex.distanceKm);
    if(!isNaN(d))totalKm+=d;
  });
  return {totalSec,totalKm};
}

function loadAllWorkouts(){
  const all=[];
  for(let i=0;i<localStorage.length;i++){
    const rawKey=localStorage.key(i);
    if(!rawKey||!rawKey.startsWith('dw_workouts_'))continue;
    const dateKey=rawKey.replace('dw_workouts_','');
    if(!/^\d{4}-\d{2}-\d{2}$/.test(dateKey))continue;
    try{
      const arr=JSON.parse(localStorage.getItem(rawKey)||'[]');
      if(!Array.isArray(arr))continue;
      arr.forEach((w,idx)=>{all.push({workout:w,dateKey,indexInDay:idx});});
    }catch(e){}
  }
  all.sort((a,b)=>{
    const ta=a.workout.startTime?new Date(a.workout.startTime).getTime():new Date(a.dateKey).getTime();
    const tb=b.workout.startTime?new Date(b.workout.startTime).getTime():new Date(b.dateKey).getTime();
    return tb-ta;
  });
  return all;
}

function daysAgo(dateKey){
  const d=new Date(dateKey+'T00:00:00');
  const now=new Date();
  now.setHours(0,0,0,0);
  return Math.round((now-d)/(1000*60*60*24));
}

function niceDate(dateKey){
  const d=new Date(dateKey+'T00:00:00');
  const age=daysAgo(dateKey);
  if(age===0)return 'Today';
  if(age===1)return 'Yesterday';
  if(age<7)return d.toLocaleDateString('en-AU',{weekday:'long'});
  return d.toLocaleDateString('en-AU',{day:'numeric',month:'short',year:(new Date().getFullYear()===d.getFullYear()?undefined:'numeric')});
}

function updateSummary(items){
  const w7=items.filter(x=>daysAgo(x.dateKey)<=6).length;
  const w30=items.filter(x=>daysAgo(x.dateKey)<=29).length;
  document.getElementById('countWeek').textContent=w7;
  document.getElementById('countMonth').textContent=w30;
  document.getElementById('countTotal').textContent=items.length;
}

let currentFilter='all';
let allItems=[];

function render(){
  const list=document.getElementById('historyList');
  const filtered=allItems.filter(x=>currentFilter==='all'?true:classifyWorkout(x.workout)===currentFilter);
  if(filtered.length===0){
    const msg=allItems.length===0?'No workouts logged yet.<br>Finish your first session and it&rsquo;ll show up here.':'No '+currentFilter+' workouts in your history.';
    list.innerHTML='<div class="empty-state"><span class="emoji">🏋️</span>'+msg+'</div>';
    return;
  }
  const kg=getBodyWeightKg();
  list.innerHTML='';
  filtered.forEach((item,listIdx)=>{
    const w=item.workout;
    const type=classifyWorkout(w);
    const burn=estimateBurn(w,kg);
    const vol=computeVolume(w);
    const cardio=computeCardioSummary(w);
    const bits=[];
    if(w.duration)bits.push(Math.round(w.duration)+' min');
    if(type==='strength'&&vol>0)bits.push(Math.round(vol).toLocaleString()+' kg vol');
    if(cardio.totalKm>0)bits.push(cardio.totalKm.toFixed(1)+' km');
    const startedAt=w.startTime?new Date(w.startTime).toLocaleTimeString('en-AU',{hour:'numeric',minute:'2-digit'}):'';
    const div=document.createElement('div');
    div.className='history-item';
    div.innerHTML=`
      <div class="hi-head" data-listidx="${listIdx}">
        <div class="hi-left">
          <div class="hi-date">${niceDate(item.dateKey)}${startedAt?' · '+startedAt:''}</div>
          <div class="hi-name ${type}">${w.name||'Workout'}</div>
          <div class="hi-meta">${bits.join(' · ')||'No details'}</div>
        </div>
        <div class="hi-right">
          ${burn>0?`<div class="hi-burn">${burn} kcal</div>`:''}
          <svg class="hi-chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
      </div>
      <div class="hi-body">
        <div class="hi-exercises" id="exercises-${listIdx}"></div>
        <div class="hi-footer">
          <div class="hi-started">${w.startTime?'Started '+new Date(w.startTime).toLocaleString('en-AU',{day:'numeric',month:'short',hour:'numeric',minute:'2-digit'}):''}</div>
          <button class="hi-delete" data-listidx="${listIdx}">✕ Delete</button>
        </div>
      </div>`;
    list.appendChild(div);
  });

  list.querySelectorAll('.hi-head').forEach(head=>{
    head.addEventListener('click',()=>{
      const idx=parseInt(head.dataset.listidx);
      const item=head.parentElement;
      const expanded=item.classList.toggle('expanded');
      if(expanded)renderExercisesFor(idx);
    });
  });
  list.querySelectorAll('.hi-delete').forEach(btn=>{
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      const idx=parseInt(btn.dataset.listidx);
      deleteWorkout(idx);
    });
  });
}

function renderExercisesFor(listIdx){
  const filtered=allItems.filter(x=>currentFilter==='all'?true:classifyWorkout(x.workout)===currentFilter);
  const item=filtered[listIdx];
  if(!item)return;
  const container=document.getElementById('exercises-'+listIdx);
  if(!container||container.childElementCount>0)return;
  const exs=item.workout.exercises||[];
  if(exs.length===0){container.innerHTML='<div style="color:var(--muted);font-size:12px;padding:10px 0">No exercise detail captured.</div>';return;}
  exs.forEach(ex=>{
    const row=document.createElement('div');row.className='hi-ex';
    if(ex.cardio){
      const mins=(ex.durationSec||0)/60;
      const parts=[];
      if(mins>0)parts.push(mins.toFixed(1)+' min');
      if(ex.distanceKm)parts.push(parseFloat(ex.distanceKm).toFixed(2)+' km');
      if(ex.done)parts.push('✓');
      row.innerHTML=`<div class="hi-ex-name">${ex.name}</div><div class="hi-ex-cat">${ex.category||'Cardio'}</div><div class="hi-cardio-line">${parts.join(' · ')||'Logged'}</div>`;
    } else {
      const sets=ex.sets||[];
      const setPills=sets.map((s,i)=>{
        if(!s.weight&&!s.reps&&!s.done)return `<span class="hi-set-pill">Set ${i+1}: —</span>`;
        const w=s.weight||'0',r=s.reps||'0';
        return `<span class="hi-set-pill${s.done?' done':''}">${w}kg × ${r}</span>`;
      }).join('');
      row.innerHTML=`<div class="hi-ex-name">${ex.name}</div><div class="hi-ex-cat">${ex.category||'Custom'}</div><div class="hi-sets">${setPills||'<span class="hi-set-pill">No sets</span>'}</div>`;
    }
    container.appendChild(row);
  });
}

function deleteWorkout(listIdx){
  const filtered=allItems.filter(x=>currentFilter==='all'?true:classifyWorkout(x.workout)===currentFilter);
  const target=filtered[listIdx];
  if(!target)return;
  const wName=target.workout.name||'workout';
  if(!confirm(`Delete this ${wName} session from ${niceDate(target.dateKey)}? This cannot be undone.`))return;

  const dayArr=DB.get('workouts_'+target.dateKey)||[];
  let removed=false;
  if(target.workout.id!=null){
    const idx=dayArr.findIndex(w=>w.id===target.workout.id);
    if(idx>=0){dayArr.splice(idx,1);removed=true;}
  }
  if(!removed){
    if(target.indexInDay<dayArr.length){dayArr.splice(target.indexInDay,1);removed=true;}
  }
  if(removed){
    if(dayArr.length===0){
      try{localStorage.removeItem('dw_workouts_'+target.dateKey);}catch(e){}
      DB.set('workouts_'+target.dateKey,[]);
    } else {
      DB.set('workouts_'+target.dateKey,dayArr);
    }
    allItems=loadAllWorkouts();
    updateSummary(allItems);
    render();
  }
}

document.querySelectorAll('.filter-chip').forEach(chip=>{
  chip.addEventListener('click',()=>{
    document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
    chip.classList.add('active');
    currentFilter=chip.dataset.filter;
    render();
  });
});

allItems=loadAllWorkouts();
updateSummary(allItems);
render();
</script>
</body>
</html>
