<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#141110">
<title>History · WellnessSync</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;900&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#141110;--s1:#1b1712;--s2:#211c16;--s3:#2b241b;--border:#322a20;--border2:#463a2b;--accent:#e8622b;--adim:rgba(232,98,43,0.12);--green:#8ec63f;--yellow:#f0a92b;--red:#ef4d4d;--blue:#3ea6c4;--teal:#2fb59e;--purple:#c9954a;--text:#efe7da;--muted:#8a8177;--muted2:#4a4237;--disp:'Archivo',sans-serif;--mono:'Space Mono',monospace;--sans:'Inter',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;padding-bottom:100px;-webkit-font-smoothing:antialiased}
body::after{content:'';position:fixed;top:0;left:0;right:0;height:320px;background:radial-gradient(ellipse 75% 100% at 50% -35%,rgba(232,98,43,0.09),transparent 70%);pointer-events:none;z-index:0}
.wrap{position:relative;z-index:1;max-width:560px;margin:0 auto;padding:22px 15px}
.kicker{font-family:var(--mono);font-size:11px;letter-spacing:1px;color:var(--accent);margin-bottom:12px;text-transform:uppercase}
h1{font-family:var(--disp);font-weight:900;font-size:44px;line-height:0.9;letter-spacing:-2px;text-transform:uppercase;margin-bottom:16px}
.ranges{display:flex;gap:5px;background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:4px;margin-bottom:18px}
.range{flex:1;background:none;border:none;color:var(--muted);font-family:var(--disp);font-weight:700;font-size:13px;text-transform:uppercase;padding:9px 4px;border-radius:9px;cursor:pointer}
.range.active{background:var(--accent);color:#1a0f08}

.card{background:var(--s2);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px}
.c-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:2px}
.c-name{font-family:var(--disp);font-weight:900;font-size:17px;text-transform:uppercase;letter-spacing:-0.3px}
.c-val{font-family:var(--mono);font-weight:700;font-size:20px}
.c-sub{font-family:var(--mono);font-size:10px;color:var(--muted);margin-bottom:10px}
.c-sub .up{color:var(--green)} .c-sub .down{color:var(--red)}
svg.chart{width:100%;height:80px;display:block;overflow:visible}
.gl{stroke:var(--s3);stroke-width:1}
.target-line{stroke:var(--muted2);stroke-width:1;stroke-dasharray:3 3}

.sec{font-family:var(--mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin:22px 4px 10px}
.day{background:var(--s2);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:8px}
.d-top{display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.d-date{font-family:var(--disp);font-weight:900;font-size:16px;text-transform:uppercase}
.d-chips{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
.chip{font-family:var(--mono);font-size:10px;padding:4px 8px;border-radius:6px;background:var(--s3);color:var(--muted)}
.chip.hit{background:rgba(142,198,63,0.12);color:var(--green)}
.chip.miss{background:rgba(239,77,77,0.10);color:var(--red)}
.chip.wod{background:var(--adim);color:var(--accent)}
.d-arrow{color:var(--muted2);font-family:var(--mono)}
.d-detail{display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.d-detail.show{display:block}
.d-row{display:flex;justify-content:space-between;font-family:var(--mono);font-size:12px;padding:4px 0;color:var(--muted)}
.d-row .v{color:var(--text)}
.d-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:8px}
.d-tag{font-size:14px}
.empty{text-align:center;color:var(--muted);padding:40px 20px;font-size:13px}

.nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(20,17,16,0.92);backdrop-filter:blur(24px);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:10px 0 max(10px,env(safe-area-inset-bottom))}
.nav-link{position:relative;display:flex;flex-direction:column;align-items:center;gap:5px;text-decoration:none;color:var(--muted);font-family:var(--mono);font-size:9px;letter-spacing:1px;text-transform:uppercase;padding:6px 10px}
.nav-link svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.nav-link.active{color:var(--accent)}
.nav-link.active::before{content:'';position:absolute;top:-11px;left:50%;transform:translateX(-50%);width:22px;height:3px;border-radius:0 0 3px 3px;background:var(--accent)}
</style>
</head>
<body>
<div class="wrap">
  <div class="kicker">The Record</div>
  <h1>History</h1>
  <div class="ranges">
    <button class="range active" id="r-7" onclick="setRange(7)">7 Days</button>
    <button class="range" id="r-14" onclick="setRange(14)">14 Days</button>
    <button class="range" id="r-30" onclick="setRange(30)">30 Days</button>
  </div>
  <div id="charts"></div>
  <div class="sec">Day by Day</div>
  <div id="days"></div>
</div>

<nav class="nav">
  <a class="nav-link" href="index.html"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Hub</a>
  <a class="nav-link" href="nutrition.html"><svg viewBox="0 0 24 24"><path d="M12 2a7 7 0 0 1 7 7c0 5-7 13-7 13S5 14 5 9a7 7 0 0 1 7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>Fuel</a>
  <a class="nav-link" href="workout.html"><svg viewBox="0 0 24 24"><path d="M6 4v16M18 4v16M3 8h3M18 8h3M3 16h3M18 16h3M6 12h12"/></svg>Train</a>
  <a class="nav-link" href="recovery.html"><svg viewBox="0 0 24 24"><path d="M12 2a3 3 0 0 1 3 3c0 1.66-1.34 3-3 3s-3-1.34-3-3a3 3 0 0 1 3-3z"/><path d="M12 8v8M8 12h8M6 20c0-4 2-6 6-6s6 2 6 6"/></svg>Restore</a>
  <a class="nav-link" href="weight.html"><svg viewBox="0 0 24 24"><path d="M3 6h18M3 12h18M3 18h18"/></svg>Weigh</a>
</nav>

<script src="db.js"></script>
<script>
var RANGE=7;
var TARGETS={cal:3000,pro:210,steps:11000,water:3500,sleep:8};
var TAG_EMOJI={great_sleep:'\uD83D\uDCA4',bad_sleep:'\uD83D\uDE34',energized:'\u26A1',strong:'\uD83D\uDCAA',motivated:'\uD83D\uDD25',calm:'\uD83E\uDDD8',hydrated:'\uD83D\uDCA7',good_food:'\uD83E\uDD57',sore:'\uD83E\uDD74',tired:'\uD83D\uDE2A',stress:'\uD83D\uDE23',alcohol:'\uD83C\uDF77',poor_food:'\uD83C\uDF54',niggle:'\uD83E\uDE79',headache:'\uD83E\uDD15',low_mood:'\uD83D\uDE14'};

function sleepScore(rec){
  if(!rec||rec.hours==null) return null;
  var h=parseFloat(rec.hours)||0, dur;
  if(h>=7.5&&h<=9) dur=80; else if(h<7.5) dur=Math.max(0,80-(7.5-h)*18); else dur=Math.max(0,80-(h-9)*10);
  var Q={restless:-15,ok:0,solid:10,deep:20}, q=rec.quality&&Q[rec.quality]!==undefined?Q[rec.quality]:0;
  return Math.max(0,Math.min(100,Math.round(dur+q)));
}

function collect(n){
  var out=[];
  for(var i=n-1;i>=0;i--){
    var k=DB.dayKey(-i);
    var nut=DB.get('nutrition_'+k)||{entries:[]};
    var tot=nut.entries.reduce(function(a,e){return {cal:a.cal+(e.cal||0),p:a.p+(e.p||0)};},{cal:0,p:0});
    var w=DB.get('workouts_'+k)||[];
    var slp=DB.get('sleep_'+k);
    var j=DB.get('journal_'+k);
    var d=new Date(); d.setDate(d.getDate()-i);
    out.push({
      key:k, date:d,
      label:d.toLocaleDateString('en-AU',{weekday:'short',day:'numeric',month:'short'}),
      short:d.toLocaleDateString('en-AU',{day:'numeric',month:'numeric'}),
      cal:Math.round(tot.cal), pro:Math.round(tot.p),
      steps:DB.get('steps_'+k)||0, water:DB.get('water_'+k)||0,
      sleep:slp?parseFloat(slp.hours):null, sscore:sleepScore(slp),
      workouts:w, tags:(j&&j.tags)?j.tags:[]
    });
  }
  return out;
}
function weightSeries(n){
  var all=DB.get('weights')||[], out=[];
  for(var i=n-1;i>=0;i--){
    var k=DB.dayKey(-i);
    var m=all.filter(function(x){return (x.date||'').slice(0,10)===k;});
    out.push(m.length?parseFloat(m[m.length-1].kg):null);
  }
  return out;
}

function bars(vals,target,color,fmtF){
  var n=vals.length, W=100, gap=n>14?1.2:2.2, bw=(W-gap*(n-1))/n;
  var max=Math.max(target||0,Math.max.apply(null,vals.concat([1])))*1.12;
  var s='<svg class="chart" viewBox="0 0 100 46" preserveAspectRatio="none">';
  if(target){ var ty=46-(target/max*40); s+='<line class="target-line" x1="0" y1="'+ty.toFixed(1)+'" x2="100" y2="'+ty.toFixed(1)+'" vector-effect="non-scaling-stroke"/>'; }
  vals.forEach(function(v,i){
    var h=Math.max(0.6,(v/max)*40), x=i*(bw+gap), y=46-h;
    var hit=target&&v>=target;
    s+='<rect x="'+x.toFixed(1)+'" y="'+y.toFixed(1)+'" width="'+bw.toFixed(1)+'" height="'+h.toFixed(1)+'" rx="0.8" fill="'+color+'" opacity="'+(v===0?0.18:(hit?1:0.55))+'"/>';
  });
  return s+'</svg>';
}
function line(vals,color){
  var pts=[], n=vals.length, valid=vals.filter(function(v){return v!=null;});
  if(!valid.length) return '<div class="empty" style="padding:16px">No data logged yet</div>';
  var mn=Math.min.apply(null,valid), mx=Math.max.apply(null,valid), rg=(mx-mn)||1;
  vals.forEach(function(v,i){ if(v==null)return; var x=(i/(n-1||1))*100, y=42-((v-mn)/rg)*36; pts.push(x.toFixed(1)+','+y.toFixed(1)); });
  var s='<svg class="chart" viewBox="0 0 100 46" preserveAspectRatio="none">';
  s+='<polyline fill="none" stroke="'+color+'" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" vector-effect="non-scaling-stroke" points="'+pts.join(' ')+'"/>';
  pts.forEach(function(p){var c=p.split(',');s+='<circle cx="'+c[0]+'" cy="'+c[1]+'" r="1.6" fill="'+color+'" vector-effect="non-scaling-stroke"/>';});
  return s+'</svg>';
}
function avg(a){var v=a.filter(function(x){return x!=null;});return v.length?v.reduce(function(x,y){return x+y;},0)/v.length:0;}

function card(name,valTxt,subHtml,chartHtml,color){
  return '<div class="card"><div class="c-top"><div class="c-name">'+name+'</div><div class="c-val" style="color:'+color+'">'+valTxt+'</div></div>'
    +'<div class="c-sub">'+subHtml+'</div>'+chartHtml+'</div>';
}

function render(){
  var d=collect(RANGE), C=document.getElementById('charts');
  var hitDays=function(arr,t){return arr.filter(function(v){return v>=t;}).length;};
  var calA=avg(d.map(function(x){return x.cal;})), proA=avg(d.map(function(x){return x.pro;}));
  var stpA=avg(d.map(function(x){return x.steps;})), watA=avg(d.map(function(x){return x.water;}));
  var slpVals=d.map(function(x){return x.sleep;}), slpA=avg(slpVals);
  var scVals=d.map(function(x){return x.sscore;}), scA=avg(scVals);
  var wt=weightSeries(RANGE), wtV=wt.filter(function(v){return v!=null;});

  var html='';
  html+=card('Calories',Math.round(calA),'avg/day \u00b7 target '+TARGETS.cal.toLocaleString()+' \u00b7 <span class="up">'+hitDays(d.map(function(x){return x.cal;}),TARGETS.cal*0.9)+'/'+RANGE+' near target</span>',bars(d.map(function(x){return x.cal;}),TARGETS.cal,'#e8622b'),'#e8622b');
  html+=card('Protein',Math.round(proA)+'g','avg/day \u00b7 target '+TARGETS.pro+'g \u00b7 <span class="up">'+hitDays(d.map(function(x){return x.pro;}),TARGETS.pro)+'/'+RANGE+' hit</span>',bars(d.map(function(x){return x.pro;}),TARGETS.pro,'#8ec63f'),'#8ec63f');
  html+=card('Steps',Math.round(stpA).toLocaleString(),'avg/day \u00b7 target '+TARGETS.steps.toLocaleString()+' \u00b7 <span class="up">'+hitDays(d.map(function(x){return x.steps;}),TARGETS.steps)+'/'+RANGE+' hit</span>',bars(d.map(function(x){return x.steps;}),TARGETS.steps,'#f0a92b'),'#f0a92b');
  html+=card('Water',(watA/1000).toFixed(1)+'L','avg/day \u00b7 target 3.5L \u00b7 <span class="up">'+hitDays(d.map(function(x){return x.water;}),TARGETS.water)+'/'+RANGE+' hit</span>',bars(d.map(function(x){return x.water;}),TARGETS.water,'#3ea6c4'),'#3ea6c4');
  html+=card('Sleep',slpA?slpA.toFixed(1)+'h':'\u2014',slpA?('avg/night \u00b7 target 8h \u00b7 <span class="up">'+hitDays(slpVals.filter(function(v){return v!=null;}),7.5)+' nights 7.5h+</span>'):'No sleep logged yet \u2014 log it on the Hub',bars(slpVals.map(function(v){return v||0;}),TARGETS.sleep,'#3ea6c4'),'#3ea6c4');
  html+=card('Sleep Score',scA?Math.round(scA):'\u2014',scA?'avg score \u00b7 out of 100':'Log hours + quality to build this',bars(scVals.map(function(v){return v||0;}),null,'#2fb59e'),'#2fb59e');
  var wDelta=wtV.length>1?(wtV[wtV.length-1]-wtV[0]):0;
  html+=card('Weight',wtV.length?wtV[wtV.length-1].toFixed(1)+'kg':'\u2014',wtV.length>1?('<span class="'+(wDelta<0?'up':'down')+'">'+(wDelta<0?'\u2193 ':'\u2191 ')+Math.abs(wDelta).toFixed(1)+'kg over '+RANGE+' days</span> \u00b7 weekly weigh-in'):'Log your weekly weigh-in',line(wt,'#e8843b'),'#e8843b');
  C.innerHTML=html;

  var D=document.getElementById('days'), dh='';
  d.slice().reverse().forEach(function(x,i){
    var wod=x.workouts.length?x.workouts.map(function(w){return w.name;}).join(', '):null;
    var chips='';
    chips+='<span class="chip '+(x.cal>=TARGETS.cal*0.9?'hit':(x.cal?'miss':''))+'">'+(x.cal||0)+' kcal</span>';
    chips+='<span class="chip '+(x.pro>=TARGETS.pro?'hit':(x.pro?'miss':''))+'">'+(x.pro||0)+'g P</span>';
    chips+='<span class="chip '+(x.steps>=TARGETS.steps?'hit':(x.steps?'miss':''))+'">'+(x.steps||0).toLocaleString()+' steps</span>';
    chips+='<span class="chip '+(x.water>=TARGETS.water?'hit':(x.water?'miss':''))+'">'+((x.water||0)/1000).toFixed(1)+'L</span>';
    if(x.sleep!=null) chips+='<span class="chip '+(x.sleep>=7.5?'hit':'miss')+'">'+x.sleep+'h \u00b7 '+x.sscore+'</span>';
    if(wod) chips+='<span class="chip wod">'+wod+'</span>';
    var sets='';
    x.workouts.forEach(function(w){
      sets+='<div class="d-row"><span>'+w.name+'</span><span class="v">'+(w.duration||0)+' min</span></div>';
      if(w.log){ Object.keys(w.log).forEach(function(ei){ var done=(w.log[ei]||[]).filter(function(s){return s&&s.done;});
        if(done.length) sets+='<div class="d-row" style="padding-left:10px"><span>\u00b7 set log</span><span class="v">'+done.map(function(s){return s.w+'\u00d7'+s.r;}).join('  ')+'</span></div>'; }); }
    });
    var tags=x.tags.length?'<div class="d-tags">'+x.tags.map(function(t){return '<span class="d-tag">'+(TAG_EMOJI[t]||'\u2022')+'</span>';}).join('')+'</div>':'';
    dh+='<div class="day"><div class="d-top" onclick="this.parentNode.querySelector(\'.d-detail\').classList.toggle(\'show\')">'
      +'<div class="d-date">'+x.label+'</div><div class="d-arrow">\u203A</div></div>'
      +'<div class="d-chips">'+chips+'</div>'
      +'<div class="d-detail">'
      +'<div class="d-row"><span>Calories</span><span class="v">'+x.cal+' / '+TARGETS.cal+'</span></div>'
      +'<div class="d-row"><span>Protein</span><span class="v">'+x.pro+'g / '+TARGETS.pro+'g</span></div>'
      +'<div class="d-row"><span>Steps</span><span class="v">'+x.steps.toLocaleString()+' / '+TARGETS.steps.toLocaleString()+'</span></div>'
      +'<div class="d-row"><span>Water</span><span class="v">'+(x.water/1000).toFixed(2)+'L / 3.5L</span></div>'
      +'<div class="d-row"><span>Sleep</span><span class="v">'+(x.sleep!=null?(x.sleep+'h \u00b7 score '+x.sscore):'\u2014')+'</span></div>'
      +(sets||'')
      +tags
      +'</div></div>';
  });
  D.innerHTML=dh||'<div class="empty">No history yet.</div>';
}
function setRange(n){ RANGE=n; [7,14,30].forEach(function(x){document.getElementById('r-'+x).classList.toggle('active',x===n);}); render(); }
render();
</script>
</body>
</html>
